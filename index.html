<!DOCTYPE html>
<html lang="en" data-theme="default">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#f8fafc">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Lucy's Chinese Vocab">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="icon" href="assets/favicon.png">
  <link rel="manifest" href="manifest.json">
  <title>Lucy's Chinese Vocab</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: 'var(--bg)',
            surface: 'var(--surface)',
            surface2: 'var(--surface2)',
            accent: 'var(--accent)',
            accent2: 'var(--accent2)',
            gold: 'var(--gold)',
            green: 'var(--green)',
            red: 'var(--red)',
            txt: 'var(--text)',
            txt2: 'var(--text2)',
            border: 'var(--border)',
          },
          boxShadow: {
            'card-sm': 'var(--shadow-sm)',
            'card': 'var(--shadow-md)',
            'card-lg': 'var(--shadow-lg)',
          },
          borderRadius: {
            'card': '16px',
          },
          fontFamily: {
            sans: ['-apple-system', 'BlinkMacSystemFont', 'SF Pro Text', 'Helvetica Neue', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/core.css">
</head>
<body class="bg-bg text-txt font-sans antialiased select-none">
  <div id="app" class="max-w-[480px] mx-auto h-dvh flex flex-col relative overflow-hidden" style="padding-top: env(safe-area-inset-top, 0px);">
    <div id="top-bar" class="shrink-0"></div>
    <div id="screen-home" class="screen active"></div>
    <div id="screen-grid" class="screen"></div>
    <div id="screen-progress" class="screen"></div>
    <div id="screen-shop" class="screen"></div>
    <div id="screen-practice" class="screen"></div>
    <div id="overlay-container"></div>
    <div id="bottom-nav" class="shrink-0"></div>
  </div>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').then(reg => {
        reg.update();
        setInterval(() => reg.update(), 60000);

        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              newWorker.postMessage({ type: 'SKIP_WAITING' });
            }
          });
        });
      });
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        window.location.reload();
      });
    }
  </script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
