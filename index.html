<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Lucy's Chinese Vocab</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f0f1a;--surface:#1a1a2e;--surface2:#252542;--accent:#7c5cfc;
  --accent2:#ff6b9d;--gold:#ffd700;--green:#00e676;--red:#ff5252;
  --text:#e8e8f0;--text2:#8888aa;--radius:16px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden}
button{font-family:inherit;cursor:pointer;border:none;outline:none;-webkit-tap-highlight-color:transparent}
.app{max-width:480px;margin:0 auto;padding:16px;min-height:100dvh;display:flex;flex-direction:column}

/* Header */
.header{text-align:center;padding:12px 0 8px}
.header h1{font-size:1.4rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header .sub{font-size:.75rem;color:var(--text2);margin-top:2px}

/* Stats bar */
.stats-bar{display:flex;justify-content:center;gap:16px;padding:8px 0;flex-wrap:wrap}
.stat{text-align:center}
.stat .val{font-size:1.1rem;font-weight:700;color:var(--gold)}
.stat .lbl{font-size:.65rem;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}

/* Level bar */
.level-bar{margin:8px 0 12px;padding:8px 16px;background:var(--surface);border-radius:var(--radius);display:flex;align-items:center;gap:12px}
.level-bar .level-name{font-size:.75rem;font-weight:600;color:var(--accent);white-space:nowrap}
.level-bar .xp-track{flex:1;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
.level-bar .xp-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .5s ease}
.level-bar .xp-text{font-size:.65rem;color:var(--text2);white-space:nowrap}

/* Nav */
.nav{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;justify-content:center}
.nav button{padding:9px 13px;border-radius:12px;background:var(--surface);color:var(--text2);font-size:.75rem;font-weight:600;transition:all .2s}
.nav button.active{background:var(--accent);color:#fff}
.nav button:hover{background:var(--surface2)}
.nav button.active:hover{background:var(--accent)}

/* Set filter */
.set-filter{display:flex;gap:8px;justify-content:center;margin-bottom:12px}
.set-filter button{padding:6px 14px;border-radius:10px;background:var(--surface);color:var(--text2);font-size:.7rem;font-weight:600;transition:all .2s}
.set-filter button.active{background:var(--accent2);color:#fff}

/* Flashcard */
.card-container{flex:1;display:flex;align-items:center;justify-content:center;perspective:1000px;padding:20px 0;position:relative;touch-action:pan-y}
.flashcard{width:100%;max-width:360px;aspect-ratio:3/4;position:relative;cursor:pointer;transform-style:preserve-3d;transition:transform .5s ease;-webkit-user-select:none;user-select:none}
.flashcard.flipped{transform:rotateY(180deg)}
.flashcard .face{position:absolute;inset:0;border-radius:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;backface-visibility:hidden;-webkit-backface-visibility:hidden}
.flashcard .front{background:linear-gradient(145deg,var(--surface),var(--surface2));border:1px solid rgba(124,92,252,.2)}
.flashcard .back{background:linear-gradient(145deg,var(--surface2),var(--surface));border:1px solid rgba(255,107,157,.2);transform:rotateY(180deg)}
.flashcard .hanzi{font-size:4rem;font-weight:700;margin-bottom:12px;line-height:1.2}
.flashcard .pinyin{font-size:1.3rem;color:var(--accent);margin-bottom:8px}
.flashcard .english{font-size:1.1rem;color:var(--text2);text-align:center}
.flashcard .tap-hint{position:absolute;bottom:20px;font-size:.7rem;color:var(--text2);opacity:.5}
.flashcard .mastery-dots{position:absolute;top:16px;right:16px;display:flex;gap:4px}
.flashcard .mastery-dots .dot{width:8px;height:8px;border-radius:50%;background:var(--surface2)}
.flashcard .mastery-dots .dot.filled{background:var(--green)}

/* Audio/mic buttons */
.audio-btn,.mic-btn{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;transition:all .2s;flex-shrink:0}
.audio-btn{background:rgba(124,92,252,.15);color:var(--accent)}
.audio-btn:hover{background:rgba(124,92,252,.3)}
.audio-btn:active{transform:scale(.9)}
.mic-btn{background:rgba(255,107,157,.15);color:var(--accent2)}
.mic-btn:hover{background:rgba(255,107,157,.3)}
.mic-btn.recording{background:var(--red);color:#fff;animation:pulse 1s infinite}
.mic-btn:active{transform:scale(.9)}
.fc-audio-row{display:flex;gap:10px;justify-content:center;align-items:center;margin-top:8px}
.fc-audio-row .pronunciation-result{font-size:.75rem;font-weight:600;min-width:80px;text-align:center;padding:4px 10px;border-radius:8px;opacity:0;transition:opacity .3s}
.fc-audio-row .pronunciation-result.show{opacity:1}
.fc-audio-row .pronunciation-result.pass{background:rgba(0,230,118,.15);color:var(--green)}
.fc-audio-row .pronunciation-result.fail{background:rgba(255,82,82,.15);color:var(--red)}
.fc-audio-row .pronunciation-result.heard{background:rgba(124,92,252,.15);color:var(--accent)}

/* Quiz audio button inline */
.quiz-prompt .audio-btn{margin:8px auto 0;width:36px;height:36px;font-size:1rem}

.card-actions{display:flex;gap:16px;justify-content:center;padding:12px 0}
.card-actions button{padding:14px 32px;border-radius:14px;font-size:.85rem;font-weight:600;transition:all .2s}
.card-actions .btn-hard{background:rgba(255,82,82,.15);color:var(--red)}
.card-actions .btn-hard:hover{background:rgba(255,82,82,.25)}
.card-actions .btn-easy{background:rgba(0,230,118,.15);color:var(--green)}
.card-actions .btn-easy:hover{background:rgba(0,230,118,.25)}
.card-counter{text-align:center;font-size:.75rem;color:var(--text2);margin-top:4px}

/* Quiz (match + speed) */
.quiz-area{flex:1;display:flex;flex-direction:column;padding:8px 0}
.quiz-prompt{text-align:center;padding:24px 16px;margin-bottom:16px}
.quiz-prompt .direction{font-size:.7rem;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.quiz-prompt .question{font-size:2.8rem;font-weight:700;line-height:1.3}
.quiz-prompt .question.english-q{font-size:1.4rem}
.quiz-prompt .question.pinyin-q{font-size:1.6rem;color:var(--accent)}
.quiz-timer{display:flex;justify-content:center;margin-bottom:12px}
.quiz-timer .bar{width:100%;max-width:300px;height:5px;background:var(--surface);border-radius:3px;overflow:hidden}
.quiz-timer .fill{height:100%;background:var(--accent);border-radius:3px;transition:width .1s linear}
.quiz-timer .fill.urgent{background:var(--red)}
.quiz-options{display:flex;flex-direction:column;gap:10px;padding:0 8px}
.quiz-options button{padding:16px 20px;border-radius:14px;background:var(--surface);color:var(--text);font-size:1rem;text-align:left;transition:all .15s;border:2px solid transparent}
.quiz-options button:hover{background:var(--surface2);border-color:var(--accent)}
.quiz-options button.correct{background:rgba(0,230,118,.15);border-color:var(--green);color:var(--green)}
.quiz-options button.wrong{background:rgba(255,82,82,.15);border-color:var(--red);color:var(--red)}
.quiz-options button:disabled{cursor:default;opacity:.85}
.quiz-score{text-align:center;padding:12px;font-size:.85rem;color:var(--text2)}
.quiz-score span{color:var(--gold);font-weight:700}

/* Speed round */
.speed-header{display:flex;justify-content:space-between;align-items:center;padding:8px 4px;margin-bottom:8px}
.speed-header .timer{font-size:2rem;font-weight:800;font-variant-numeric:tabular-nums}
.speed-header .timer.low{color:var(--red);animation:pulse .5s ease infinite}
.speed-header .score{font-size:1.2rem;font-weight:700;color:var(--gold)}

/* Draw mode */
.draw-area{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 0}
.draw-prompt{text-align:center;margin-bottom:12px}
.draw-prompt .draw-english{font-size:1.1rem;color:var(--text2);margin-bottom:4px}
.draw-prompt .draw-pinyin{font-size:1.3rem;color:var(--accent);font-weight:600}
.draw-prompt .draw-audio-row{display:flex;justify-content:center;gap:10px;margin-top:8px}
.canvas-wrap{position:relative;width:min(90vw,420px);height:min(90vw,420px);margin:0 auto;border-radius:20px;overflow:hidden;background:var(--surface);border:2px solid var(--surface2);touch-action:none}
.canvas-wrap canvas{position:absolute;top:0;left:0;width:100%;height:100%}
#drawGuide{opacity:0.12;pointer-events:none}
#drawCanvas{cursor:crosshair}
.draw-controls{display:flex;gap:10px;justify-content:center;margin-top:12px;flex-wrap:wrap}
.draw-controls button{padding:10px 20px;border-radius:12px;font-size:.8rem;font-weight:600;transition:all .2s}
.draw-controls .btn-check{background:var(--accent);color:#fff}
.draw-controls .btn-clear{background:var(--surface);color:var(--text2)}
.draw-controls .btn-next{background:rgba(0,230,118,.15);color:var(--green)}
.draw-controls .btn-guide{background:var(--surface);color:var(--text2);font-size:.7rem;padding:8px 14px}
.draw-controls .btn-guide.on{background:rgba(124,92,252,.2);color:var(--accent)}
.draw-score{text-align:center;margin-top:12px;font-size:1rem;font-weight:700;min-height:28px}
.draw-score .score-val{font-size:1.8rem}
.draw-score .score-label{font-size:.75rem;color:var(--text2)}
.draw-counter{text-align:center;font-size:.75rem;color:var(--text2);margin-top:8px}

/* Results overlay */
.results{position:fixed;inset:0;background:rgba(15,15,26,.95);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.results-card{background:var(--surface);border-radius:24px;padding:32px;text-align:center;max-width:360px;width:90%;animation:popIn .4s ease}
.results-card h2{font-size:1.5rem;margin-bottom:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.results-card .big-num{font-size:3rem;font-weight:800;color:var(--gold)}
.results-card .detail{font-size:.85rem;color:var(--text2);margin:8px 0}
.results-card .hi-score{color:var(--accent2);font-weight:700;margin:8px 0}
.results-card button{margin-top:16px;padding:14px 32px;border-radius:14px;background:var(--accent);color:#fff;font-size:.9rem;font-weight:600}

/* Stats dashboard */
.dashboard{flex:1;padding:8px 0}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.dash-card{background:var(--surface);border-radius:var(--radius);padding:16px;text-align:center}
.dash-card .dash-val{font-size:1.8rem;font-weight:800;margin-bottom:4px}
.dash-card .dash-lbl{font-size:.7rem;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.dash-card.wide{grid-column:1/-1}
.mastery-grid{margin-top:12px;display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px}
.mastery-item{background:var(--surface);border-radius:12px;padding:10px 6px;text-align:center;transition:all .2s}
.mastery-item .mi-hanzi{font-size:1.3rem;margin-bottom:2px}
.mastery-item .mi-bar{height:3px;background:var(--surface2);border-radius:2px;margin-top:4px;overflow:hidden}
.mastery-item .mi-fill{height:100%;border-radius:2px;background:var(--green);transition:width .3s}
.mastery-item.mastered{border:1px solid rgba(0,230,118,.3)}
.dash-section-title{font-size:.8rem;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin:16px 0 8px;padding-left:4px}
.reset-btn{margin-top:20px;padding:10px 24px;border-radius:12px;background:rgba(255,82,82,.1);color:var(--red);font-size:.8rem;font-weight:600;display:block;margin-left:auto;margin-right:auto}

/* Streak fire */
.streak-display{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:200;font-size:4rem;font-weight:900;opacity:0;transition:opacity .3s}
.streak-display.show{opacity:1;animation:streakPop .6s ease}

/* Confetti */
.confetti-container{position:fixed;inset:0;pointer-events:none;z-index:300;overflow:hidden}
.confetti{position:absolute;width:10px;height:10px;border-radius:2px;animation:confettiFall 3s ease-out forwards}

/* XP popup */
.xp-popup{position:fixed;pointer-events:none;z-index:150;font-weight:800;font-size:1.2rem;color:var(--gold);animation:floatUp 1s ease forwards}

/* Coins — animated via JS requestAnimationFrame for smooth arcs */
.coin{position:fixed;pointer-events:none;z-index:250;font-size:1.5rem;will-change:transform;user-select:none}
/* Correct flash on quiz buttons */
@keyframes correctPulse{
  0%{box-shadow:0 0 0 0 rgba(0,230,118,.5)}
  50%{box-shadow:0 0 20px 8px rgba(0,230,118,.3)}
  100%{box-shadow:0 0 0 0 rgba(0,230,118,0)}
}
.correct-pulse{animation:correctPulse .5s ease}

/* Animations */
@keyframes popIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes streakPop{0%{transform:translate(-50%,-50%) scale(.5);opacity:0}30%{transform:translate(-50%,-50%) scale(1.3);opacity:1}100%{transform:translate(-50%,-50%) scale(1);opacity:0}}
@keyframes confettiFall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes floatUp{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-60px);opacity:0}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.shake{animation:shake .3s ease}

/* Swipe hint */
.swipe-arrows{display:flex;justify-content:space-between;padding:0 20px;margin-top:-8px;margin-bottom:4px;opacity:.3;font-size:.7rem;color:var(--text2)}

/* Hidden */
.hidden{display:none!important}

/* Scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:2px}

/* Mobile tweaks */
@media(max-width:400px){
  .flashcard .hanzi{font-size:3rem}
  .quiz-prompt .question{font-size:2.2rem}
  .nav button{padding:7px 10px;font-size:.7rem}
  .canvas-wrap{width:min(90vw,420px);height:min(90vw,420px)}
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Lucy's Chinese Vocab</h1>
    <div class="sub" id="levelTitle">Beginner</div>
  </div>

  <div class="stats-bar">
    <div class="stat"><div class="val" id="xpVal">0</div><div class="lbl">XP</div></div>
    <div class="stat"><div class="val" id="streakVal">0<span style="font-size:.7em">🔥</span></div><div class="lbl">Streak</div></div>
    <div class="stat"><div class="val" id="masteryVal">0%</div><div class="lbl">Mastered</div></div>
  </div>

  <div class="level-bar">
    <div class="level-name" id="levelName">Beginner</div>
    <div class="xp-track"><div class="xp-fill" id="xpFill" style="width:0%"></div></div>
    <div class="xp-text" id="xpText">0 / 100</div>
  </div>

  <div class="nav">
    <button class="active" data-mode="flashcard">Flashcards</button>
    <button data-mode="match">Match</button>
    <button data-mode="speed">Speed</button>
    <button data-mode="draw">Draw</button>
    <button data-mode="stats">Stats</button>
  </div>

  <div class="set-filter">
    <button class="active" data-set="all">All 45</button>
    <button data-set="3A4B">Week 3A-4B</button>
    <button data-set="2B">Week 2B</button>
    <button data-set="weak">Needs Practice</button>
  </div>

  <!-- Flashcard mode -->
  <div id="flashcardMode">
    <div class="card-container" id="cardContainer">
      <div class="flashcard" id="flashcard">
        <div class="face front">
          <div class="mastery-dots" id="masteryDots"></div>
          <div class="hanzi" id="fcHanzi"></div>
          <button class="audio-btn" id="fcAudioFront" title="Listen">&#x1f50a;</button>
          <div class="tap-hint">tap to flip</div>
        </div>
        <div class="face back">
          <div class="hanzi" id="fcHanziBack"></div>
          <div class="pinyin" id="fcPinyin"></div>
          <div class="english" id="fcEnglish"></div>
          <div class="fc-audio-row">
            <button class="audio-btn" id="fcAudioBack" title="Listen">&#x1f50a;</button>
            <button class="mic-btn" id="fcMicBtn" title="Say it">&#x1f3a4;</button>
            <div class="pronunciation-result" id="pronResult"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="swipe-arrows"><span>← Need practice</span><span>Got it →</span></div>
    <div class="card-actions">
      <button class="btn-hard" id="btnHard">Need Practice</button>
      <button class="btn-easy" id="btnGotIt">Got It</button>
    </div>
    <div class="card-counter" id="cardCounter"></div>
  </div>

  <!-- Match mode -->
  <div id="matchMode" class="hidden">
    <div class="quiz-area">
      <div class="quiz-prompt">
        <div class="direction" id="matchDirection"></div>
        <div class="question" id="matchQuestion"></div>
        <button class="audio-btn" id="matchAudio" title="Listen">&#x1f50a;</button>
      </div>
      <div class="quiz-timer"><div class="bar"><div class="fill" id="matchTimerFill"></div></div></div>
      <div class="quiz-options" id="matchOptions"></div>
      <div class="quiz-score" id="matchScore"></div>
    </div>
  </div>

  <!-- Speed mode -->
  <div id="speedMode" class="hidden">
    <div class="quiz-area">
      <div class="speed-header">
        <div class="timer" id="speedTimer">30</div>
        <div class="score" id="speedScore">0</div>
      </div>
      <div class="quiz-prompt">
        <div class="direction" id="speedDirection"></div>
        <div class="question" id="speedQuestion"></div>
      </div>
      <div class="quiz-options" id="speedOptions"></div>
    </div>
  </div>

  <!-- Draw mode -->
  <div id="drawMode" class="hidden">
    <div class="draw-area">
      <div class="draw-prompt">
        <div class="draw-english" id="drawEnglish"></div>
        <div class="draw-pinyin" id="drawPinyin"></div>
        <div class="draw-audio-row">
          <button class="audio-btn" id="drawAudio" title="Listen">&#x1f50a;</button>
        </div>
      </div>
      <div class="canvas-wrap" id="canvasWrap">
        <canvas id="drawGuide" width="420" height="420"></canvas>
        <canvas id="drawCanvas" width="420" height="420"></canvas>
      </div>
      <div class="draw-score" id="drawScoreArea"></div>
      <div class="draw-controls">
        <button class="btn-guide" id="btnGuide">Guide</button>
        <button class="btn-clear" id="btnClear">Clear</button>
        <button class="btn-check" id="btnCheck">Check</button>
        <button class="btn-next" id="btnNext">Next</button>
      </div>
      <div class="draw-counter" id="drawCounter"></div>
    </div>
  </div>

  <!-- Stats dashboard -->
  <div id="statsMode" class="hidden">
    <div class="dashboard">
      <div class="dash-grid">
        <div class="dash-card"><div class="dash-val" id="dMastered" style="color:var(--green)">0</div><div class="dash-lbl">Words Mastered</div></div>
        <div class="dash-card"><div class="dash-val" id="dAccuracy" style="color:var(--accent)">0%</div><div class="dash-lbl">Accuracy</div></div>
        <div class="dash-card"><div class="dash-val" id="dBestStreak" style="color:var(--gold)">0</div><div class="dash-lbl">Best Streak</div></div>
        <div class="dash-card"><div class="dash-val" id="dSessions" style="color:var(--accent2)">0</div><div class="dash-lbl">Sessions</div></div>
        <div class="dash-card wide"><div class="dash-val" id="dTotalXP" style="color:var(--gold)">0</div><div class="dash-lbl">Total XP Earned</div></div>
      </div>
      <div class="dash-section-title">Word Mastery</div>
      <div class="mastery-grid" id="masteryGrid"></div>
      <button class="reset-btn" id="resetBtn">Reset All Progress</button>
    </div>
  </div>
</div>

<!-- Streak display -->
<div class="streak-display" id="streakDisplay"></div>
<!-- Confetti container -->
<div class="confetti-container" id="confettiContainer"></div>

<script>
// ===== WORD DATA =====
const WORDS = [
  {hanzi:"端午节",pinyin:"Duānwǔ Jié",english:"Dragon Boat Festival",set:"3A4B"},
  {hanzi:"龙舟",pinyin:"lóngzhōu",english:"dragon boat",set:"3A4B"},
  {hanzi:"粽子",pinyin:"zòngzi",english:"sticky rice dumpling",set:"3A4B"},
  {hanzi:"不能不",pinyin:"bù néng bù",english:"cannot not / must",set:"3A4B"},
  {hanzi:"烤鸭",pinyin:"kǎoyā",english:"roast duck",set:"3A4B"},
  {hanzi:"红烧肉",pinyin:"hóngshāo ròu",english:"red braised pork",set:"3A4B"},
  {hanzi:"家常豆腐",pinyin:"jiācháng dòufu",english:"home-style tofu",set:"3A4B"},
  {hanzi:"青菜",pinyin:"qīngcài",english:"green vegetables",set:"3A4B"},
  {hanzi:"点菜",pinyin:"diǎncài",english:"to order food",set:"3A4B"},
  {hanzi:"饮料",pinyin:"yǐnliào",english:"drinks / beverages",set:"3A4B"},

// ===== STATE =====
const LEVELS = [
  {name:"Beginner",xp:0},
  {name:"Intermediate",xp:200},
  {name:"Advanced",xp:500},
  {name:"Master",xp:1000}
];

let state;
function defaultState(){
  return {
    xp:0,streak:0,bestStreak:0,sessions:1,totalCorrect:0,totalAnswered:0,
    lastLogin:new Date().toDateString(),
    speedHighScore:0,
    words:{}
  };
}

function loadState(){
  try{
    const s=JSON.parse(localStorage.getItem('lucyVocab'));
    if(s){
      state=s;
      const today=new Date().toDateString();
      if(state.lastLogin!==today){
        state.sessions++;
        state.lastLogin=today;
        addXP(10);
        showXPPopup('+10 daily bonus!');
      }
    }else{state=defaultState();}
  }catch(e){state=defaultState();}
}

function saveState(){localStorage.setItem('lucyVocab',JSON.stringify(state))}

function getWordState(hanzi){
  if(!state.words[hanzi]) state.words[hanzi]={correct:0,streak:0,mastered:false,seen:0,wrong:0};
  return state.words[hanzi];
}

// ===== TTS =====
const hasTTS = 'speechSynthesis' in window;
let zhVoice = null;

function initTTS(){
  if(!hasTTS) return;
  const pickVoice = () => {
    const voices = speechSynthesis.getVoices();
    // Prefer zh-CN voices, fall back to any zh voice
    zhVoice = voices.find(v => v.lang === 'zh-CN')
      || voices.find(v => v.lang.startsWith('zh'))
      || null;
  };
  pickVoice();
  speechSynthesis.onvoiceschanged = pickVoice;
}

function speakChinese(text){
  if(!hasTTS) return;
  speechSynthesis.cancel();
  // Strip slashes for compound words like 过年/过春节 — speak first variant
  const clean = text.includes('/') ? text.split('/')[0].trim() : text;
  // Strip punctuation patterns like 要是...就...
  const spoken = clean.replace(/\.\.\./g, '');
  const u = new SpeechSynthesisUtterance(spoken);
  u.lang = 'zh-CN';
  u.rate = 0.85;
  if(zhVoice) u.voice = zhVoice;
  speechSynthesis.speak(u);
}

// ===== SPEECH RECOGNITION =====
// Uses a persistent continuous session so mic permission is only requested once
// (file:// URLs re-prompt on every .start() call otherwise)
const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
const hasSpeechRec = !!SpeechRec;
let recognizer = null;
let isRecording = false;
let recStarted = false; // has the persistent session been started?
let pendingRecCallback = null;
let pendingRecExpected = '';

function initSpeechRec(){
  if(!hasSpeechRec) return;
  recognizer = new SpeechRec();
  recognizer.lang = 'zh-CN';
  recognizer.interimResults = false;
  recognizer.maxAlternatives = 5;
  recognizer.continuous = true;

  recognizer.onresult = (e) => {
    // Only process if we have a pending request
    if(!pendingRecCallback) return;
    const cb = pendingRecCallback;
    const cleanExpected = pendingRecExpected;
    pendingRecCallback = null;
    isRecording = false;

    // Check the latest result
    const resultIdx = e.results.length - 1;
    const results = e.results[resultIdx];
    let matched = false;
    let heardText = '';
    for(let i = 0; i < results.length; i++){
      const t = results[i].transcript.trim();
      if(!heardText) heardText = t;
      if(t === cleanExpected || t.includes(cleanExpected) || cleanExpected.includes(t)){
        matched = true;
        heardText = t;
        break;
      }
    }
    cb({matched, heard: heardText, expected: cleanExpected});
  };

  recognizer.onerror = (e) => {
    if(pendingRecCallback){
      const cb = pendingRecCallback;
      pendingRecCallback = null;
      isRecording = false;
      cb({matched: false, heard: '', expected: pendingRecExpected, error: e.error});
    }
  };

  // Auto-restart the persistent session if it ends (silence timeout etc)
  recognizer.onend = () => {
    isRecording = false;
    if(recStarted){
      try{ recognizer.start(); }catch(e){}
    }
  };
}

function startRecognition(expectedHanzi, callback){
  if(!hasSpeechRec || !recognizer) return;

  // Clean expected: take first variant, strip dots
  const expected = expectedHanzi.includes('/')
    ? expectedHanzi.split('/')[0].trim()
    : expectedHanzi;
  pendingRecExpected = expected.replace(/\.\.\./g, '');
  pendingRecCallback = callback;
  isRecording = true;

  // Start the persistent session on first use (triggers one-time permission prompt)
  if(!recStarted){
    recStarted = true;
    try{ recognizer.start(); }catch(e){ isRecording = false; }
  }
}

// ===== XP & LEVELS =====
function getLevel(){
  let lvl=LEVELS[0];
  for(const l of LEVELS) if(state.xp>=l.xp) lvl=l;
  return lvl;
}
function getNextLevel(){
  const curr=getLevel();
  const idx=LEVELS.indexOf(curr);
  return idx<LEVELS.length-1?LEVELS[idx+1]:null;
}
function addXP(n){
  const oldLevel=getLevel().name;
  state.xp+=n;saveState();
  const newLevel=getLevel().name;
  if(newLevel!==oldLevel){showXPPopup('Level up! '+newLevel);spawnConfetti(30);}
  updateUI();
}
function showXPPopup(text){
  const el=document.createElement('div');
  el.className='xp-popup';el.textContent=text;
  el.style.left=Math.random()*60+20+'%';el.style.top='40%';
  document.body.appendChild(el);setTimeout(()=>el.remove(),1000);
}

// ===== FILTERS =====
let currentSet='all';
function getFilteredWords(){
  if(currentSet==='all') return [...WORDS];
  if(currentSet==='weak') return WORDS.filter(w=>{const ws=getWordState(w.hanzi);return ws.seen>0&&!ws.mastered;});
  return WORDS.filter(w=>w.set===currentSet);
}

// ===== UI UPDATE =====
function updateUI(){
  const lvl=getLevel();const next=getNextLevel();
  document.getElementById('xpVal').textContent=state.xp;
  document.getElementById('streakVal').innerHTML=state.streak+'<span style="font-size:.7em">🔥</span>';
  const masteredCount=WORDS.filter(w=>getWordState(w.hanzi).mastered).length;
  const pct=Math.round(masteredCount/WORDS.length*100);
  document.getElementById('masteryVal').textContent=pct+'%';
  document.getElementById('levelTitle').textContent=lvl.name;
  document.getElementById('levelName').textContent=lvl.name;
  if(next){
    const progress=((state.xp-lvl.xp)/(next.xp-lvl.xp))*100;
    document.getElementById('xpFill').style.width=Math.min(progress,100)+'%';
    document.getElementById('xpText').textContent=(state.xp-lvl.xp)+' / '+(next.xp-lvl.xp);
  }else{
    document.getElementById('xpFill').style.width='100%';
    document.getElementById('xpText').textContent='MAX';
  }
  if(pct>=100&&!state._m100){state._m100=true;spawnConfetti(60);showXPPopup('100% Mastery!');}
  else if(pct>=50&&!state._m50){state._m50=true;spawnConfetti(40);showXPPopup('50% Mastery!');}
}

// ===== FLASHCARD MODE =====
let fcDeck=[],fcIndex=0,fcFlipped=false,fcCurrentWord=null;

function initFlashcards(){
  let words=getFilteredWords();
  if(words.length===0) words=[...WORDS];
  fcDeck=[];
  for(const w of words){
    const ws=getWordState(w.hanzi);
    const weight=ws.mastered?1:(ws.seen===0?2:(3-Math.min(ws.streak,2)));
    for(let i=0;i<weight;i++) fcDeck.push(w);
  }
  shuffle(fcDeck);
  const deduped=[fcDeck[0]];
  for(let i=1;i<fcDeck.length;i++){
    if(fcDeck[i].hanzi!==deduped[deduped.length-1].hanzi) deduped.push(fcDeck[i]);
  }
  fcDeck=deduped;fcIndex=0;
  showFlashcard();
}

function showFlashcard(){
  if(fcDeck.length===0) return;
  const w=fcDeck[fcIndex%fcDeck.length];
  fcCurrentWord=w;
  fcFlipped=false;
  document.getElementById('flashcard').classList.remove('flipped');
  document.getElementById('fcHanzi').textContent=w.hanzi;
  document.getElementById('fcHanziBack').textContent=w.hanzi;
  document.getElementById('fcPinyin').textContent=w.pinyin;
  document.getElementById('fcEnglish').textContent=w.english;
  document.getElementById('cardCounter').textContent=(fcIndex+1)+' / '+fcDeck.length;
  // Clear pronunciation result
  const pr=document.getElementById('pronResult');
  pr.className='pronunciation-result';pr.textContent='';
  // Mastery dots
  const ws=getWordState(w.hanzi);
  const dots=document.getElementById('masteryDots');dots.innerHTML='';
  for(let i=0;i<3;i++){
    const d=document.createElement('div');
    d.className='dot'+(i<ws.streak?' filled':'');
    dots.appendChild(d);
  }
  // Hide mic if not supported
  document.getElementById('fcMicBtn').style.display=hasSpeechRec?'flex':'none';
}

document.getElementById('fcAudioFront').addEventListener('click',(e)=>{
  e.stopPropagation();
  if(fcCurrentWord) speakChinese(fcCurrentWord.hanzi);
});
document.getElementById('fcAudioBack').addEventListener('click',(e)=>{
  e.stopPropagation();
  if(fcCurrentWord) speakChinese(fcCurrentWord.hanzi);
});

// Mic button
document.getElementById('fcMicBtn').addEventListener('click',(e)=>{
  e.stopPropagation();
  if(!fcCurrentWord||!hasSpeechRec) return;
  const micBtn=document.getElementById('fcMicBtn');
  const pr=document.getElementById('pronResult');
  if(isRecording){return;}
  micBtn.classList.add('recording');
  pr.className='pronunciation-result';pr.textContent='';
  startRecognition(fcCurrentWord.hanzi,(result)=>{
    micBtn.classList.remove('recording');
    if(result.error){
      pr.className='pronunciation-result show fail';
      pr.textContent=result.error==='no-speech'?'No speech heard':'Error: '+result.error;
      return;
    }
    if(result.matched){
      pr.className='pronunciation-result show pass';
      pr.textContent='Great! ✓';
      addXP(3);spawnCoins(5);
    }else{
      pr.className='pronunciation-result show heard';
      pr.textContent='Heard: '+result.heard;
    }
  });
});

document.getElementById('flashcard').addEventListener('click',()=>{
  fcFlipped=!fcFlipped;
  document.getElementById('flashcard').classList.toggle('flipped',fcFlipped);
});

document.getElementById('btnGotIt').addEventListener('click',()=>fcAnswer(true));
document.getElementById('btnHard').addEventListener('click',()=>fcAnswer(false));

function fcAnswer(correct){
  if(fcDeck.length===0) return;
  const w=fcDeck[fcIndex%fcDeck.length];
  const ws=getWordState(w.hanzi);ws.seen++;
  if(correct){
    ws.streak=Math.min(ws.streak+1,3);ws.correct++;state.totalCorrect++;state.streak++;
    if(state.streak>state.bestStreak) state.bestStreak=state.streak;
    addXP(5+(state.streak>=5?5:0));
    spawnCoins(state.streak>=5?6:3);
    if(ws.streak>=3&&!ws.mastered){ws.mastered=true;showXPPopup('Mastered: '+w.hanzi);addXP(20);spawnConfetti(15);spawnCoins(10);}
    if(state.streak===10){showStreak(10);spawnConfetti(20);}
    else if(state.streak===25){showStreak(25);spawnConfetti(30);}
    else if(state.streak%50===0&&state.streak>0){showStreak(state.streak);spawnConfetti(40);}
    else if(state.streak>=3) showStreak(state.streak);
  }else{ws.streak=0;ws.wrong++;state.streak=0;}
  state.totalAnswered++;saveState();updateUI();
  fcIndex++;
  if(fcIndex>=fcDeck.length){initFlashcards();return;}
  showFlashcard();
}

// Swipe
let touchStartX=0,touchStartY=0;
const cardContainer=document.getElementById('cardContainer');
cardContainer.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;},{passive:true});
cardContainer.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-touchStartX;
  const dy=e.changedTouches[0].clientY-touchStartY;
  if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)){
    if(dx>0) fcAnswer(true); else fcAnswer(false);
  }
},{passive:true});

// ===== MATCH MODE =====
let matchTimer,matchTimeLeft,matchCorrect=0,matchTotal=0,matchWords=[],matchCurrentWord=null;

function initMatch(){
  matchCorrect=0;matchTotal=0;
  matchWords=getFilteredWords();
  if(matchWords.length<4) matchWords=[...WORDS];
  document.getElementById('matchScore').innerHTML='Score: <span>0 / 0</span>';
  nextMatchQuestion();
}

function nextMatchQuestion(){
  clearInterval(matchTimer);
  const pool=matchWords;
  const correct=pool[Math.floor(Math.random()*pool.length)];
  matchCurrentWord=correct;
  const directions=['hanzi2eng','eng2hanzi','pinyin2eng'];
  const dir=directions[Math.floor(Math.random()*directions.length)];
  const prompt=document.getElementById('matchQuestion');
  const dirLabel=document.getElementById('matchDirection');
  const audioBtn=document.getElementById('matchAudio');
  prompt.className='question';

  if(dir==='hanzi2eng'){
    dirLabel.textContent='What does this mean?';
    prompt.textContent=correct.hanzi;
    audioBtn.classList.remove('hidden');
  }else if(dir==='eng2hanzi'){
    dirLabel.textContent='Choose the correct characters';
    prompt.textContent=correct.english;
    prompt.className='question english-q';
    audioBtn.classList.add('hidden');
  }else{
    dirLabel.textContent='What does this mean?';
    prompt.textContent=correct.pinyin;
    prompt.className='question pinyin-q';
    audioBtn.classList.remove('hidden');
  }

  const options=[correct];
  const others=pool.filter(w=>w.hanzi!==correct.hanzi);shuffle(others);
  while(options.length<4&&others.length>0) options.push(others.pop());
  shuffle(options);

  const container=document.getElementById('matchOptions');container.innerHTML='';
  for(const opt of options){
    const btn=document.createElement('button');
    btn.textContent=dir==='eng2hanzi'?opt.hanzi:opt.english;
    btn.addEventListener('click',()=>handleMatchAnswer(btn,opt,correct,container,dir));
    container.appendChild(btn);
  }

  // Auto-pronounce the word when the question appears
  speakChinese(correct.hanzi);

  matchTimeLeft=10;
  const fill=document.getElementById('matchTimerFill');
  fill.style.width='100%';fill.classList.remove('urgent');
  matchTimer=setInterval(()=>{
    matchTimeLeft-=0.1;
    fill.style.width=Math.max((matchTimeLeft/10)*100,0)+'%';
    if(matchTimeLeft<=3) fill.classList.add('urgent');
    if(matchTimeLeft<=0){
      clearInterval(matchTimer);matchTotal++;state.streak=0;state.totalAnswered++;saveState();updateUI();
      container.querySelectorAll('button').forEach(b=>{
        b.disabled=true;
        const correctText=dir==='eng2hanzi'?correct.hanzi:correct.english;
        if(b.textContent===correctText) b.classList.add('correct');
      });
      document.getElementById('matchScore').innerHTML='Score: <span>'+matchCorrect+' / '+matchTotal+'</span>';
      setTimeout(nextMatchQuestion,1200);
    }
  },100);
}

// Match audio
document.getElementById('matchAudio').addEventListener('click',()=>{
  if(matchCurrentWord) speakChinese(matchCurrentWord.hanzi);
});

function handleMatchAnswer(btn,chosen,correct,container,dir){
  clearInterval(matchTimer);matchTotal++;state.totalAnswered++;
  container.querySelectorAll('button').forEach(b=>b.disabled=true);
  const ws=getWordState(correct.hanzi);ws.seen++;
  if(chosen.hanzi===correct.hanzi){
    btn.classList.add('correct');btn.classList.add('correct-pulse');matchCorrect++;
    ws.streak=Math.min(ws.streak+1,3);ws.correct++;state.totalCorrect++;state.streak++;
    if(state.streak>state.bestStreak) state.bestStreak=state.streak;
    addXP(10+(state.streak>=5?5:0));
    const r=btn.getBoundingClientRect();
    spawnCoins(state.streak>=5?8:4,r.left+r.width/2,r.top);
    if(ws.streak>=3&&!ws.mastered){ws.mastered=true;showXPPopup('Mastered: '+correct.hanzi);addXP(20);spawnConfetti(15);spawnCoins(12);}
    if(state.streak>=3) showStreak(state.streak);
    if(state.streak===10) spawnConfetti(20);
    speakChinese(correct.hanzi);
  }else{
    btn.classList.add('wrong');ws.streak=0;ws.wrong++;state.streak=0;
    container.querySelectorAll('button').forEach(b=>{
      if(!b.classList.contains('wrong')){
        const correctText=dir==='eng2hanzi'?correct.hanzi:correct.english;
        if(b.textContent===correctText) b.classList.add('correct');
      }
    });
    btn.classList.add('shake');
  }
  saveState();updateUI();
  document.getElementById('matchScore').innerHTML='Score: <span>'+matchCorrect+' / '+matchTotal+'</span>';
  setTimeout(nextMatchQuestion,1200);
}

  const container=document.getElementById('speedOptions');container.innerHTML='';
  for(const opt of options){
    const btn=document.createElement('button');
    btn.textContent=dir==='hanzi2eng'?opt.english:opt.hanzi;
    btn.addEventListener('click',()=>{
      if(!speedActive) return;
      const ws=getWordState(correct.hanzi);ws.seen++;state.totalAnswered++;
      if(opt.hanzi===correct.hanzi){
        btn.classList.add('correct');btn.classList.add('correct-pulse');speedScore++;
        ws.streak=Math.min(ws.streak+1,3);ws.correct++;state.totalCorrect++;state.streak++;
        if(state.streak>state.bestStreak) state.bestStreak=state.streak;
        addXP(8);
        const sr=btn.getBoundingClientRect();
        spawnCoins(3,sr.left+sr.width/2,sr.top);
        if(ws.streak>=3&&!ws.mastered){ws.mastered=true;addXP(20);}
        document.getElementById('speedScore').textContent=speedScore;
      }else{btn.classList.add('wrong');ws.streak=0;ws.wrong++;state.streak=0;}
      saveState();updateUI();
      setTimeout(nextSpeedQuestion,400);
    });
    container.appendChild(btn);
  }
}

function endSpeedRound(){
  const isHighScore=speedScore>state.speedHighScore;
  if(isHighScore){state.speedHighScore=speedScore;saveState();}
  const overlay=document.createElement('div');overlay.className='results';
  overlay.innerHTML=`<div class="results-card"><h2>Time's Up!</h2><div class="big-num">${speedScore}</div><div class="detail">correct answers in 30 seconds</div>${isHighScore?'<div class="hi-score">New High Score!</div>':'<div class="detail">Best: '+state.speedHighScore+'</div>'}<button id="speedAgain">Go Again</button></div>`;
  document.body.appendChild(overlay);
  if(isHighScore) spawnConfetti(30);
  overlay.querySelector('#speedAgain').addEventListener('click',()=>{overlay.remove();initSpeed();});
  overlay.addEventListener('click',e=>{if(e.target===overlay){overlay.remove();initSpeed();}});
}

// ===== DRAW MODE =====
let drawDeck=[],drawIndex=0,drawCurrentWord=null,guideOn=false;
const CW=420; // canvas resolution
const drawCanvas=document.getElementById('drawCanvas');
const drawCtx=drawCanvas.getContext('2d');
const guideCanvas=document.getElementById('drawGuide');
const guideCtx=guideCanvas.getContext('2d');
const scoreCanvas=document.createElement('canvas');
scoreCanvas.width=CW;scoreCanvas.height=CW;
const scoreCtx=scoreCanvas.getContext('2d');

let isDrawing=false,lastDrawX=0,lastDrawY=0;

function initDraw(){
  let words=getFilteredWords();
  if(words.length===0) words=[...WORDS];
  drawDeck=shuffle([...words]);
  drawIndex=0;
  guideOn=false;
  document.getElementById('btnGuide').classList.remove('on');
  showDrawWord();
}

function showDrawWord(){
  if(drawDeck.length===0) return;
  const w=drawDeck[drawIndex%drawDeck.length];
  drawCurrentWord=w;
  document.getElementById('drawEnglish').textContent=w.english;
  document.getElementById('drawPinyin').textContent=w.pinyin;
  document.getElementById('drawCounter').textContent=(drawIndex+1)+' / '+drawDeck.length;
  document.getElementById('drawScoreArea').innerHTML='';
  clearDrawCanvas();
  renderGuide(w.hanzi);
}

function clearDrawCanvas(){
  drawCtx.clearRect(0,0,CW,CW);
}

function renderGuide(hanzi){
  guideCtx.clearRect(0,0,CW,CW);
  const text = hanzi.includes('/') ? hanzi.split('/')[0].trim() : hanzi;
  const clean = text.replace(/\.\.\./g,'');
  const pad = CW * 0.08; // keep 8% padding on each side
  const maxW = CW - pad * 2;
  const fontFace = '-apple-system, "Noto Sans SC", "Microsoft YaHei", sans-serif';

  // Start large and shrink until text fits within canvas padding
  let fontSize = 300;
  guideCtx.font = `bold ${fontSize}px ${fontFace}`;
  while(fontSize > 40 && guideCtx.measureText(clean).width > maxW){
    fontSize -= 4;
    guideCtx.font = `bold ${fontSize}px ${fontFace}`;
  }

  guideCtx.fillStyle = '#ffffff';
  guideCtx.textAlign = 'center';
  guideCtx.textBaseline = 'middle';
  guideCtx.fillText(clean, CW/2, CW/2);

  guideCanvas.style.opacity = guideOn ? '0.12' : '0';

  scoreCtx.clearRect(0,0,CW,CW);
  scoreCtx.font = guideCtx.font;
  scoreCtx.fillStyle = '#ffffff';
  scoreCtx.textAlign = 'center';
  scoreCtx.textBaseline = 'middle';
  scoreCtx.fillText(clean, CW/2, CW/2);
}

function getDrawPos(e){
  const rect = drawCanvas.getBoundingClientRect();
  const scaleX = CW / rect.width;
  const scaleY = CW / rect.height;
  if(e.touches){
    return {x:(e.touches[0].clientX-rect.left)*scaleX, y:(e.touches[0].clientY-rect.top)*scaleY};
  }
  return {x:(e.clientX-rect.left)*scaleX, y:(e.clientY-rect.top)*scaleY};
}

function startDraw(e){
  e.preventDefault();
  isDrawing=true;
  const p=getDrawPos(e);
  lastDrawX=p.x;lastDrawY=p.y;
  drawCtx.beginPath();
  drawCtx.moveTo(p.x,p.y);
}

function moveDraw(e){
  if(!isDrawing) return;
  e.preventDefault();
  const p=getDrawPos(e);
  drawCtx.strokeStyle='#e8e8f0';
  drawCtx.lineWidth=10;
  drawCtx.lineCap='round';
  drawCtx.lineJoin='round';
  drawCtx.beginPath();
  drawCtx.moveTo(lastDrawX,lastDrawY);
  drawCtx.lineTo(p.x,p.y);
  drawCtx.stroke();
  lastDrawX=p.x;lastDrawY=p.y;
}

function endDraw(e){
  if(e) e.preventDefault();
  isDrawing=false;
}

drawCanvas.addEventListener('mousedown',startDraw);
drawCanvas.addEventListener('mousemove',moveDraw);
drawCanvas.addEventListener('mouseup',endDraw);
drawCanvas.addEventListener('mouseleave',endDraw);
drawCanvas.addEventListener('touchstart',startDraw,{passive:false});
drawCanvas.addEventListener('touchmove',moveDraw,{passive:false});
drawCanvas.addEventListener('touchend',endDraw,{passive:false});

// Score the drawing
function scoreDrawing(){
  // Downsample both canvases to a grid for comparison
  const gridSize = 30;
  const cellW = CW/gridSize, cellH = CW/gridSize;

  const targetData = scoreCtx.getImageData(0,0,CW,CW).data;
  const drawnData = drawCtx.getImageData(0,0,CW,CW).data;

  let targetCells = new Set();
  let drawnCells = new Set();

  for(let gy=0; gy<gridSize; gy++){
    for(let gx=0; gx<gridSize; gx++){
      const key = gy*gridSize+gx;
      let tHit=false, dHit=false;
      const sx = Math.floor(gx*cellW + cellW/2);
      const sy = Math.floor(gy*cellH + cellH/2);
      const idx = (sy*CW+sx)*4;
      if(targetData[idx+3]>50) tHit=true;
      if(drawnData[idx+3]>50) dHit=true;
      for(let dy=-1;dy<=1;dy++){
        for(let dx=-1;dx<=1;dx++){
          const cx=Math.min(CW-1,Math.max(0,Math.floor(gx*cellW+cellW/2+dx*cellW*0.3)));
          const cy=Math.min(CW-1,Math.max(0,Math.floor(gy*cellH+cellH/2+dy*cellH*0.3)));
          const ci=(cy*CW+cx)*4;
          if(targetData[ci+3]>50) tHit=true;
          if(drawnData[ci+3]>50) dHit=true;
        }
      }
      if(tHit) targetCells.add(key);
      if(dHit) drawnCells.add(key);
    }
  }

  if(targetCells.size===0||drawnCells.size===0) return 0;

  let overlap=0;
  for(const k of drawnCells){if(targetCells.has(k)) overlap++;}

  const precision = overlap/drawnCells.size; // how much of what you drew is on target
  const recall = overlap/targetCells.size;   // how much of the target you covered
  if(precision+recall===0) return 0;
  // F1-like score
  const score = (2*precision*recall)/(precision+recall)*100;
  return Math.round(Math.min(score,100));
}

document.getElementById('btnCheck').addEventListener('click',()=>{
  if(!drawCurrentWord) return;
  const score = scoreDrawing();
  const area = document.getElementById('drawScoreArea');
  let color = '--red';
  let label = 'Keep practising';
  if(score >= 70){color='--green';label='Great!';}
  else if(score >= 45){color='--gold';label='Good effort!';}
  else if(score >= 25){color='--accent';label='Getting there';}
  area.innerHTML=`<div class="score-val" style="color:var(${color})">${score}%</div><div class="score-label">${label}</div>`;

  // XP and coins based on score
  if(score >= 70){addXP(15);spawnCoins(8);}
  else if(score >= 45){addXP(8);spawnCoins(4);}
  else if(score >= 25) addXP(3);

  // Speak the word
  speakChinese(drawCurrentWord.hanzi);

  // Briefly show the guide
  guideCanvas.style.opacity='0.25';
  setTimeout(()=>{guideCanvas.style.opacity=guideOn?'0.12':'0';},2000);
});

document.getElementById('btnClear').addEventListener('click',clearDrawCanvas);

document.getElementById('btnNext').addEventListener('click',()=>{

  showDrawWord();
});

document.getElementById('btnGuide').addEventListener('click',()=>{

  document.getElementById('btnGuide').classList.toggle('on',guideOn);

});

// Coin burst — physics-based arcs via rAF
function spawnCoins(count, originX, originY){
  const cx = originX ?? window.innerWidth / 2;
  const cy = originY ?? window.innerHeight * 0.45;
  for(let i = 0; i < count; i++){
    const el = document.createElement('div');
    el.className = 'coin';
    el.textContent = '🪙';
    el.style.left = cx + 'px';
    el.style.top = cy + 'px';
    document.body.appendChild(el);
    // Random upward burst
    const angle = -Math.PI/2 + (Math.random() - 0.5) * Math.PI * 0.9;
    const speed = 3 + Math.random() * 4;
    let vx = Math.cos(angle) * speed;
    let vy = Math.sin(angle) * speed;
    const gravity = 0.15;
    let x = 0, y = 0, opacity = 1;
    const delay = i * 30; // stagger
    let started = false;
    const t0 = performance.now();
    function tick(now){
      if(now - t0 < delay){requestAnimationFrame(tick);return;}
      if(!started){started = true;}
      vy += gravity;
      x += vx;
      y += vy;
      // Fade out after peak
      if(vy > 0) opacity -= 0.025;
      el.style.transform = `translate(${x}px,${y}px)`;
      el.style.opacity = Math.max(opacity, 0);
      if(opacity > 0){
        requestAnimationFrame(tick);
      }else{
        el.remove();
      }
    }
    requestAnimationFrame(tick);
  }
}

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}
