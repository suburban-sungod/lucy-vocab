<!DOCTYPE html>
<html lang="en" data-theme="default">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#0f0f1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Lucy's Chinese Vocab">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="icon" href="assets/favicon.png">
  <link rel="manifest" href="manifest.json">
  <title>Lucy's Chinese Vocab</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/home.css">
  <link rel="stylesheet" href="css/grid.css">
  <link rel="stylesheet" href="css/progress.css">
  <link rel="stylesheet" href="css/practice.css">
  <link rel="stylesheet" href="css/overlays.css">
</head>
<body>
  <div id="app">
    <div id="top-bar"></div>
    <div id="screen-home" class="screen active"></div>
    <div id="screen-grid" class="screen"></div>
    <div id="screen-progress" class="screen"></div>
    <div id="screen-practice" class="screen"></div>
    <div id="overlay-container"></div>
    <div id="bottom-nav"></div>
  </div>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').then(reg => {
        // Check for updates immediately, then every 60s
        reg.update();
        setInterval(() => reg.update(), 60000);

        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              // New version ready — activate it
              newWorker.postMessage({ type: 'SKIP_WAITING' });
            }
          });
        });
      });
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        window.location.reload();
      });
    }
  </script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
