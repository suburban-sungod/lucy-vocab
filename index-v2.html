<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Vocab">
<link rel="apple-touch-icon" href="apple-touch-icon.png?v=2">
<link rel="icon" type="image/png" sizes="32x32" href="favicon.png?v=2">
<link rel="manifest" href="manifest.json">
<title>Lucy's Chinese Vocab</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f0f1a;--surface:#1a1a2e;--surface2:#252542;--accent:#7c5cfc;
  --accent2:#ff6b9d;--gold:#ffd700;--green:#00e676;--red:#ff5252;
  --text:#e8e8f0;--text2:#8888aa;--overlay:rgba(15,15,26,.92);--radius:16px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden}
button{font-family:inherit;cursor:pointer;border:none;outline:none;-webkit-tap-highlight-color:transparent}
.app{max-width:480px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;position:relative}

/* Top bar */
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 8px;position:relative;z-index:10}
.top-bar .streak-info{display:flex;align-items:center;gap:6px;font-size:.9rem;font-weight:700}
.top-bar .streak-info .flame{font-size:1.2rem}
.top-bar .streak-count{color:var(--gold)}
.top-bar .palette-btn{width:36px;height:36px;border-radius:10px;background:var(--surface);color:var(--text2);font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:all .2s}

/* Screens */
.screen{display:none;flex:1;flex-direction:column;padding:0 16px 100px}
.screen.active{display:flex}
.screen-fade-in{animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* Mastery hero grid */
.mastery-hero-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:8px 0}
.mastery-tile{aspect-ratio:1;border-radius:14px;background:var(--surface);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;border:2px solid transparent;position:relative;overflow:hidden}
.mastery-tile:active{transform:scale(.93)}
.mastery-tile .mt-hanzi{font-size:1.15rem;font-weight:700;line-height:1.2}
.mastery-tile .mt-eng{font-size:.4rem;color:var(--text2);line-height:1.1;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:90%;margin-top:1px}
.mastery-tile.st-mastered{border-color:rgba(0,230,118,.4)}
.mastery-tile.st-fading{border-color:rgba(255,183,77,.4)}
.mastery-tile.st-learning{border-color:color-mix(in srgb,var(--accent) 30%,transparent)}
.mastery-tile.st-needs-review{border-color:rgba(255,82,82,.4)}
.mastery-tile.st-unseen{border-color:transparent}

/* Mastery summary */
.mastery-summary{text-align:center;padding:6px 0;font-size:.8rem;color:var(--text2)}
.mastery-summary .ms-count{color:var(--green);font-weight:700}
.mastery-summary .ms-learning{color:var(--accent);font-weight:600}
.mastery-summary .ms-new{color:var(--text2)}

/* Practice button — Locket shutter style */
.practice-btn-wrap{display:flex;justify-content:center;padding:16px 0 8px}
.practice-btn{width:72px;height:72px;border-radius:50%;background:linear-gradient(145deg,var(--gold),#ffaa00);color:#1a1a2e;font-size:1.6rem;font-weight:900;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(255,215,0,.3);transition:all .2s;border:3px solid rgba(255,255,255,.2)}
.practice-btn:active{transform:scale(.9);box-shadow:0 2px 10px rgba(255,215,0,.2)}

/* Bottom nav — floating pill */
.bottom-nav{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:4px;padding:6px;background:var(--surface);border-radius:20px;z-index:50;box-shadow:0 4px 20px rgba(0,0,0,.4);border:1px solid var(--surface2)}
.bottom-nav button{width:52px;height:40px;border-radius:14px;background:transparent;color:var(--text2);display:flex;align-items:center;justify-content:center;transition:all .2s}
.bottom-nav button.active{background:var(--accent);color:#fff}
.bottom-nav button svg{width:22px;height:22px}

/* Progress screen */
.progress-screen .big-streak{text-align:center;padding:24px 0 8px}
.progress-screen .big-streak-num{font-size:4rem;font-weight:900;color:var(--gold);line-height:1}
.progress-screen .big-streak-label{font-size:.8rem;color:var(--text2);margin-top:4px}
.progress-screen .best-streak-line{text-align:center;font-size:.75rem;color:var(--text2);margin-bottom:16px}

/* Streak calendar v2 — dark rounded squares */
.streak-calendar-v2{padding:0 4px}
.streak-calendar-v2 .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.streak-calendar-v2 .cal-day-label{font-size:.55rem;color:var(--text2);text-align:center;text-transform:uppercase}
.streak-calendar-v2 .cal-day{aspect-ratio:1;border-radius:8px;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:.65rem;color:var(--text2);position:relative}
.streak-calendar-v2 .cal-day.today{border:1.5px solid var(--accent)}
.streak-calendar-v2 .cal-day.practiced{background:var(--accent);color:#fff}
.streak-calendar-v2 .cal-day.empty{background:transparent}

/* Daily prizes */
.daily-prizes{display:flex;gap:8px;justify-content:center;margin-top:12px;flex-wrap:wrap}
.daily-prizes .prize{padding:6px 12px;border-radius:10px;font-size:.7rem;font-weight:600;background:var(--surface2);color:var(--text2)}
.daily-prizes .prize.earned{background:rgba(255,215,0,.15);color:var(--gold)}
.daily-prizes .prize.next{border:1px dashed var(--gold);color:var(--gold)}

/* Theme overlay */
.theme-overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:90;background:var(--overlay);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.theme-overlay-card{background:var(--surface);border-radius:24px;padding:28px 24px;text-align:center;max-width:360px;width:90%;animation:popIn .4s ease}
.theme-overlay-card h3{font-size:1.1rem;margin-bottom:16px;color:var(--text)}
.theme-picker{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;padding:4px 0;align-items:center}
.theme-hint{font-size:.65rem;color:var(--text2);text-align:center;margin-top:4px;width:100%}
.theme-dot{width:32px;height:32px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:all .2s;position:relative;display:flex;align-items:center;justify-content:center;font-size:.7rem}
.theme-dot.active{border-color:var(--gold);box-shadow:0 0 8px rgba(255,215,0,.3)}
.theme-dot.locked{opacity:.4;cursor:default;filter:grayscale(1)}
.theme-dot.locked::after{content:'🔒';font-size:.55rem;position:absolute}
.theme-overlay .reset-btn{margin-top:20px;padding:10px 24px;border-radius:12px;background:rgba(255,82,82,.1);color:var(--red);font-size:.8rem;font-weight:600}
.theme-overlay .close-btn{margin-top:12px;padding:10px 24px;border-radius:12px;background:var(--surface2);color:var(--text);font-size:.8rem;font-weight:600}

/* Word detail overlay */
.word-detail-overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;background:var(--overlay);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.word-detail-card{background:var(--surface);border-radius:24px;padding:28px 24px;text-align:center;max-width:360px;width:90%;animation:popIn .4s ease}
.word-detail-card .wd-hanzi{font-size:3rem;font-weight:700;margin-bottom:8px}
.word-detail-card .wd-pinyin{font-size:1.2rem;color:var(--accent);margin-bottom:4px}
.word-detail-card .wd-english{font-size:1rem;color:var(--text2);margin-bottom:16px}
.word-detail-card .wd-status{display:inline-block;padding:4px 14px;border-radius:20px;font-size:.75rem;font-weight:600;margin-bottom:16px}
.word-detail-card .wd-status.st-mastered{background:rgba(0,230,118,.15);color:var(--green)}
.word-detail-card .wd-status.st-fading{background:rgba(255,183,77,.15);color:#ffb74d}
.word-detail-card .wd-status.st-learning{background:color-mix(in srgb,var(--accent) 15%,transparent);color:var(--accent)}
.word-detail-card .wd-status.st-unseen{background:var(--surface2);color:var(--text2)}
.word-detail-card .wd-status.st-needs-review{background:rgba(255,82,82,.15);color:var(--red)}
.wd-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:12px 0}
.wd-stats .wd-stat{text-align:center}
.wd-stats .wd-stat-val{font-size:1.1rem;font-weight:700;color:var(--gold)}
.wd-stats .wd-stat-lbl{font-size:.6rem;color:var(--text2);text-transform:uppercase}
.wd-actions{display:flex;gap:10px;justify-content:center;margin-top:16px;flex-wrap:wrap}
.wd-actions button{padding:10px 20px;border-radius:12px;font-size:.8rem;font-weight:600}
.wd-actions .wd-practice{background:var(--accent);color:#fff}
.wd-actions .wd-close{background:var(--surface2);color:var(--text)}

/* Practice overlay */
.practice-overlay{position:fixed;inset:0;z-index:80;background:var(--bg);display:flex;flex-direction:column}
.practice-overlay .practice-inner{max-width:480px;width:100%;margin:0 auto;display:flex;flex-direction:column;flex:1;overflow:hidden}
.practice-header{display:flex;align-items:center;padding:14px 16px 10px;gap:12px}
.practice-close{width:36px;height:36px;border-radius:10px;background:var(--surface);color:var(--text2);font-size:1.1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.progress-dots{display:flex;gap:6px;flex:1;justify-content:center}
.progress-dots .dot{width:10px;height:10px;border-radius:50%;background:var(--surface2);transition:all .3s}
.progress-dots .dot.current{background:var(--accent);transform:scale(1.2)}
.progress-dots .dot.correct{background:var(--green)}
.progress-dots .dot.wrong{background:var(--red)}
.practice-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;overflow-y:auto}

/* Practice results */
.practice-results{text-align:center;animation:popIn .4s ease;width:100%;max-width:360px}
.practice-results h2{font-size:1.5rem;margin-bottom:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.practice-results .big-num{font-size:3rem;font-weight:800;color:var(--gold)}
.practice-results .detail{font-size:.85rem;color:var(--text2);margin:8px 0}
.review-mistakes-list{text-align:left;margin:16px 0}
.review-mistakes-list .mistake-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface2);border-radius:12px;margin-bottom:8px}
.mistake-item .mi-hanzi{font-size:1.3rem;font-weight:700;min-width:60px}
.mistake-item .mi-detail{flex:1;font-size:.8rem;color:var(--text2);line-height:1.4}
.mistake-item .mi-detail .mi-pinyin{color:var(--accent);font-weight:600}
.mistake-item .audio-btn{width:32px;height:32px;font-size:.9rem;flex-shrink:0}
.practice-results .result-actions{display:flex;gap:10px;justify-content:center;margin-top:16px;flex-wrap:wrap}
.practice-results .result-actions button{padding:12px 24px;border-radius:14px;font-size:.85rem;font-weight:600}
.practice-results .btn-done{background:var(--accent);color:#fff}
.practice-results .btn-again{background:var(--surface2);color:var(--text)}

/* Flashcard (within practice) */
.card-container{flex:1;display:flex;align-items:center;justify-content:center;perspective:1000px;padding:20px 0;position:relative;touch-action:pan-y;width:100%}
.flashcard{width:100%;max-width:340px;aspect-ratio:3/4;position:relative;cursor:pointer;transform-style:preserve-3d;transition:transform .5s ease;-webkit-user-select:none;user-select:none}
.flashcard.flipped{transform:rotateY(180deg)}
.flashcard .face{position:absolute;inset:0;border-radius:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;backface-visibility:hidden;-webkit-backface-visibility:hidden}
.flashcard .front{background:linear-gradient(145deg,var(--surface),var(--surface2));border:1px solid color-mix(in srgb,var(--accent) 20%,transparent)}
.flashcard .back{background:linear-gradient(145deg,var(--surface2),var(--surface));border:1px solid color-mix(in srgb,var(--accent2) 20%,transparent);transform:rotateY(180deg)}
.flashcard .hanzi{font-size:3.5rem;font-weight:700;margin-bottom:12px;line-height:1.2}
.flashcard .pinyin{font-size:1.3rem;color:var(--accent);margin-bottom:8px}
.flashcard .english{font-size:1.1rem;color:var(--text2);text-align:center}
.flashcard .tap-hint{position:absolute;bottom:20px;font-size:.7rem;color:var(--text2);opacity:.5}
.flashcard .mastery-dots{position:absolute;top:16px;right:16px;display:flex;gap:4px}
.flashcard .mastery-dots .dot{width:8px;height:8px;border-radius:50%;background:var(--surface2)}
.flashcard .mastery-dots .dot.filled{background:var(--green)}

/* Audio/mic buttons */
.audio-btn,.mic-btn{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;transition:all .2s;flex-shrink:0}
.audio-btn{background:color-mix(in srgb,var(--accent) 15%,transparent);color:var(--accent)}
.audio-btn:hover{background:color-mix(in srgb,var(--accent) 30%,transparent)}
.audio-btn:active{transform:scale(.9)}
.mic-btn{background:color-mix(in srgb,var(--accent2) 15%,transparent);color:var(--accent2)}
.mic-btn:hover{background:color-mix(in srgb,var(--accent2) 30%,transparent)}
.mic-btn.recording{background:var(--red);color:#fff;animation:pulse 1s infinite}
.mic-btn:active{transform:scale(.9)}
.fc-audio-row{display:flex;gap:10px;justify-content:center;align-items:center;margin-top:8px}
.fc-audio-row .pronunciation-result{font-size:.75rem;font-weight:600;min-width:80px;text-align:center;padding:4px 10px;border-radius:8px;opacity:0;transition:opacity .3s}
.fc-audio-row .pronunciation-result.show{opacity:1}
.fc-audio-row .pronunciation-result.pass{background:rgba(0,230,118,.15);color:var(--green)}
.fc-audio-row .pronunciation-result.fail{background:rgba(255,82,82,.15);color:var(--red)}
.fc-audio-row .pronunciation-result.heard{background:color-mix(in srgb,var(--accent) 15%,transparent);color:var(--accent)}

.card-actions{display:flex;gap:16px;justify-content:center;padding:12px 0}
.card-actions button{padding:14px 32px;border-radius:14px;font-size:.85rem;font-weight:600;transition:all .2s}
.card-actions .btn-hard{background:rgba(255,82,82,.15);color:var(--red)}
.card-actions .btn-hard:hover{background:rgba(255,82,82,.25)}
.card-actions .btn-easy{background:rgba(0,230,118,.15);color:var(--green)}
.card-actions .btn-easy:hover{background:rgba(0,230,118,.25)}

/* Quiz (match + context within practice) */
.quiz-prompt{text-align:center;padding:24px 16px;margin-bottom:16px}
.quiz-prompt .direction{font-size:.7rem;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.quiz-prompt .question{font-size:2.8rem;font-weight:700;line-height:1.3}
.quiz-prompt .question.english-q{font-size:1.4rem}
.quiz-prompt .question.pinyin-q{font-size:1.6rem;color:var(--accent)}
.quiz-prompt .audio-btn{margin:8px auto 0;width:36px;height:36px;font-size:1rem}
.quiz-timer{display:flex;justify-content:center;margin-bottom:12px;width:100%}
.quiz-timer .bar{width:100%;max-width:300px;height:5px;background:var(--surface);border-radius:3px;overflow:hidden}
.quiz-timer .fill{height:100%;background:var(--accent);border-radius:3px;transition:width .1s linear}
.quiz-timer .fill.urgent{background:var(--red)}
.quiz-options{display:flex;flex-direction:column;gap:10px;padding:0 8px;width:100%}
.quiz-options button{padding:18px 22px;border-radius:14px;background:var(--surface);color:var(--text);font-size:1.15rem;text-align:left;transition:all .15s;border:2px solid transparent}
@media(hover:hover){.quiz-options button:hover{background:var(--surface2);border-color:var(--accent)}}
.quiz-options button.correct{background:rgba(0,230,118,.15);border-color:var(--green);color:var(--green)}
.quiz-options button.wrong{background:rgba(255,82,82,.15);border-color:var(--red);color:var(--red)}
.quiz-options button:disabled{cursor:default;opacity:.85}

/* Context sentence */
.context-sentence{text-align:center;padding:16px;margin-bottom:12px;font-size:1.3rem;line-height:1.8;color:var(--text)}
.context-sentence .blank{display:inline-block;min-width:60px;border-bottom:3px solid var(--accent);margin:0 4px;color:var(--accent);font-weight:700}
.context-english{text-align:center;font-size:.8rem;color:var(--text2);margin-bottom:16px;padding:0 16px}

/* Pairs grid */
.pairs-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 8px;width:100%}
.pairs-grid .pair-tile{padding:18px 14px;border-radius:14px;background:var(--surface);color:var(--text);font-size:1.1rem;text-align:center;transition:all .2s;border:2px solid transparent;cursor:pointer;min-height:56px;display:flex;align-items:center;justify-content:center;word-break:break-word}
.pairs-grid .pair-tile.chinese{font-size:1.3rem;font-weight:700}
.pairs-grid .pair-tile.selected{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 15%,transparent)}
.pairs-grid .pair-tile.matched{opacity:.3;pointer-events:none;border-color:var(--green);background:rgba(0,230,118,.1)}
.pairs-grid .pair-tile.wrong{animation:shake .3s ease;border-color:var(--red)}

/* Correct flash on quiz buttons */
@keyframes correctPulse{
  0%{box-shadow:0 0 0 0 rgba(0,230,118,.5)}
  50%{box-shadow:0 0 20px 8px rgba(0,230,118,.3)}
  100%{box-shadow:0 0 0 0 rgba(0,230,118,0)}
}
.correct-pulse{animation:correctPulse .5s ease}

/* Swipe arrows */
.swipe-arrows{display:flex;justify-content:space-between;padding:0 20px;margin-top:-8px;margin-bottom:4px;opacity:.3;font-size:.7rem;color:var(--text2)}

/* Streak fire display */
.streak-display{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:200;font-size:4rem;font-weight:900;opacity:0;transition:opacity .3s}
.streak-display.show{opacity:1;animation:streakPop .6s ease}

/* Sadie overlay */
.sadie-overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:400;background:var(--overlay);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);opacity:0;pointer-events:none;transition:opacity .3s}
.sadie-overlay.show{opacity:1;pointer-events:auto}
.sadie-overlay img{width:240px;height:240px;object-fit:cover;border-radius:50%;border:4px solid var(--gold);animation:sadieBounce .6s ease}
.sadie-overlay .sadie-text{margin-top:16px;font-size:1.6rem;font-weight:800;color:var(--gold);text-align:center;animation:sadieBounce .6s ease .1s both}
@keyframes sadieBounce{0%{transform:scale(0) rotate(-10deg);opacity:0}60%{transform:scale(1.15) rotate(3deg);opacity:1}100%{transform:scale(1) rotate(0deg);opacity:1}}

/* Reward banner */
.reward-overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:500;background:var(--overlay);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);opacity:0;pointer-events:none;transition:opacity .3s}
.reward-overlay.show{opacity:1;pointer-events:auto}
.reward-card{background:linear-gradient(145deg,var(--surface),var(--surface2));border:3px solid var(--gold);border-radius:24px;padding:32px 28px;text-align:center;max-width:340px;width:90%;animation:sadieBounce .5s ease;box-shadow:0 0 40px rgba(255,215,0,.2)}
.reward-card .reward-amount{font-size:4rem;font-weight:900;color:var(--gold);line-height:1}
.reward-card .reward-title{font-size:1.1rem;font-weight:700;color:var(--text);margin:12px 0 4px}
.reward-card .reward-detail{font-size:.8rem;color:var(--text2);margin-bottom:16px}
.reward-card .reward-receipt{font-size:.65rem;color:var(--text2);border-top:1px solid var(--surface2);padding-top:12px;margin-top:12px;font-variant-numeric:tabular-nums}
.reward-card .reward-hint{font-size:.7rem;color:var(--accent);margin-top:12px}
.reward-close{margin-top:16px;padding:10px 28px;border-radius:12px;background:var(--accent);color:#fff;font-size:.85rem;font-weight:600}

/* Welcome banner */
.welcome-overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:600;background:var(--overlay);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);opacity:0;pointer-events:none;transition:opacity .3s}
.welcome-overlay.show{opacity:1;pointer-events:auto}
.welcome-card{background:linear-gradient(145deg,var(--surface),var(--surface2));border:2px solid color-mix(in srgb,var(--accent) 30%,transparent);border-radius:24px;padding:32px 28px;text-align:center;max-width:360px;width:90%;animation:popIn .4s ease}
.welcome-card img{width:100px;height:100px;object-fit:cover;border-radius:50%;border:3px solid var(--gold);margin-bottom:12px}
.welcome-card h2{font-size:1.4rem;margin-bottom:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.welcome-card p{font-size:.9rem;color:var(--text2);line-height:1.5;margin-bottom:20px}
.welcome-card .prize-hint{font-size:.8rem;color:var(--gold);font-weight:600;margin-bottom:20px}
.welcome-card button{padding:14px 32px;border-radius:14px;background:var(--accent);color:#fff;font-size:.9rem;font-weight:600}

/* Confetti */
.confetti-container{position:fixed;inset:0;pointer-events:none;z-index:300;overflow:hidden}
.confetti{position:absolute;width:10px;height:10px;border-radius:2px;animation:confettiFall 3s ease-out forwards}

/* XP popup */
.xp-popup{position:fixed;pointer-events:none;z-index:150;font-weight:800;font-size:1.2rem;color:var(--gold);animation:floatUp 1s ease forwards}
.xp-popup.double{color:var(--gold);font-size:1.6rem;text-shadow:0 0 12px rgba(255,215,0,.5)}

/* Coins */
.coin{position:fixed;pointer-events:none;z-index:250;font-size:1.5rem;will-change:transform;user-select:none}

/* Badge toast */
.badge-toast{position:fixed;top:0;left:0;right:0;z-index:350;display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 16px;background:linear-gradient(135deg,color-mix(in srgb,var(--accent) 95%,transparent),color-mix(in srgb,var(--accent2) 95%,transparent));color:#fff;font-size:.85rem;font-weight:600;transform:translateY(-100%);transition:transform .3s ease;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.badge-toast.show{transform:translateY(0)}
.badge-toast .bt-emoji{font-size:1.3rem}

/* Animations */
@keyframes popIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes streakPop{0%{transform:translate(-50%,-50%) scale(.5);opacity:0}30%{transform:translate(-50%,-50%) scale(1.3);opacity:1}100%{transform:translate(-50%,-50%) scale(1);opacity:0}}
@keyframes confettiFall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes floatUp{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-60px);opacity:0}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.shake{animation:shake .3s ease}
@keyframes goldenShimmer{0%{box-shadow:0 0 0 0 rgba(255,215,0,.4)}50%{box-shadow:0 0 15px 5px rgba(255,215,0,.2)}100%{box-shadow:0 0 0 0 rgba(255,215,0,0)}}
.golden-shimmer{animation:goldenShimmer .6s ease}

.hidden{display:none!important}

/* Scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:2px}

/* Theme overrides */
[data-theme="sakura"]{--bg:#1a0f14;--surface:#2a1a22;--surface2:#3a2432;--accent:#e8789a;--accent2:#ff9bb8;--text:#f0e4e8;--text2:#aa7788;--overlay:rgba(26,15,20,.92)}
[data-theme="ocean"]{--bg:#0a1520;--surface:#152535;--surface2:#1e3448;--accent:#3db8e8;--accent2:#6dd5fa;--text:#e0f0f8;--text2:#6899aa;--overlay:rgba(10,21,32,.92)}
[data-theme="sunset"]{--bg:#1a120a;--surface:#2e1e12;--surface2:#42301e;--accent:#e87830;--accent2:#ffac6e;--text:#f8ece0;--text2:#aa8866;--overlay:rgba(26,18,10,.92)}
[data-theme="neon"]{--bg:#0a0a0a;--surface:#1a1a1a;--surface2:#252525;--accent:#00e676;--accent2:#69f0ae;--text:#e8f8e8;--text2:#66aa77;--overlay:rgba(10,10,10,.92)}
[data-theme="midnight"]{--bg:#0e0e1e;--surface:#1a1a30;--surface2:#252548;--accent:#8888cc;--accent2:#b0b0e8;--text:#d8d8f0;--text2:#7777aa;--overlay:rgba(14,14,30,.92)}

/* Responsive — small phones */
@media(max-width:380px){
  .mastery-hero-grid{gap:5px}
  .mastery-tile .mt-hanzi{font-size:1rem}
  .mastery-tile .mt-eng{font-size:.35rem}
  .flashcard .hanzi{font-size:2.8rem}
  .quiz-prompt .question{font-size:2.2rem}
  .practice-btn{width:64px;height:64px;font-size:1.4rem}
}
@media(max-width:340px){
  .mastery-hero-grid{grid-template-columns:repeat(5,1fr);gap:4px}
  .mastery-tile{border-radius:10px}
}
</style>
</head>

let state;
function defaultState(){
  return {
    xp:0,streak:0,bestStreak:0,sessions:1,totalCorrect:0,totalAnswered:0,
    lastLogin:new Date().toDateString(),
    speedHighScore:0,
    words:{},
    dailyHistory:[],
    dailyStreak:0,
    bestDailyStreak:0,
    dailyRewards:{},
    badges:{},
    unlockedThemes:['default'],
    activeTheme:'default',
    lastPerfectRound:0,
    _perfectMatch:false,
    _perfectContext:false,
    _lightningPairs:false
  };
}

function loadState(){
  try{
    const s=JSON.parse(localStorage.getItem('lucyVocab'));
    if(s){
      state=s;
      if(!state.dailyHistory) state.dailyHistory=[];
      if(!state.dailyStreak) state.dailyStreak=0;
      if(!state.bestDailyStreak) state.bestDailyStreak=0;
      if(!state.dailyRewards) state.dailyRewards={};
      if(!state.badges) state.badges={};
      if(!state.unlockedThemes) state.unlockedThemes=['default'];
      if(!state.activeTheme) state.activeTheme='default';
      if(!state.lastPerfectRound) state.lastPerfectRound=0;
      if(state._perfectMatch===undefined) state._perfectMatch=false;
      if(state._perfectContext===undefined) state._perfectContext=false;
      if(state._lightningPairs===undefined) state._lightningPairs=false;
      const today=new Date().toDateString();
      const todayISO=new Date().toISOString().slice(0,10);
      if(state.lastLogin!==today){
        state.sessions++;
        state.lastLogin=today;
        addXP(10);
        showXPPopup('+10 daily bonus!');
      }
      if(!state.dailyHistory.includes(todayISO)){
        state.dailyHistory.push(todayISO);
        const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
        const yesterdayISO=yesterday.toISOString().slice(0,10);
        if(state.dailyHistory.includes(yesterdayISO)){
          state.dailyStreak++;
        }else{
          state.dailyStreak=1;
        }
        if(state.dailyStreak>state.bestDailyStreak) state.bestDailyStreak=state.dailyStreak;
        saveState();
        checkDailyRewards();
      }
    }else{state=defaultState();}
  }catch(e){state=defaultState();}
}

function checkDailyRewards(){
  const milestones={7:'$3',14:'$5',30:'$10'};
  for(const [days,amount] of Object.entries(milestones)){
    if(state.dailyStreak>=parseInt(days)&&!state.dailyRewards[days]){
      state.dailyRewards[days]=true;
      saveState();
      setTimeout(()=>showReward(amount,days+' day streak!','Dad owes you '+amount),500);
      break;
    }
  }
}

function saveState(){localStorage.setItem('lucyVocab',JSON.stringify(state))}

function getWordState(hanzi){
  if(!state.words[hanzi]) state.words[hanzi]={correct:0,streak:0,mastered:false,seen:0,wrong:0,lastCorrect:0};
  const ws=state.words[hanzi];
  if(!ws.lastCorrect) ws.lastCorrect=0;
  return ws;
}

// ===== SPACED REPETITION =====
function getWordWeight(hanzi){
  const ws=getWordState(hanzi);
  if(ws.seen===0) return 5;
  const daysSince=ws.lastCorrect?Math.floor((Date.now()-ws.lastCorrect)/(1000*60*60*24)):30;
  const wrongRatio=ws.seen>0?(ws.wrong/ws.seen):0;
  let weight=1;
  if(ws.mastered){
    if(daysSince>=7) weight=3;
    else if(daysSince>=3) weight=2;
    else weight=0.3;
  }else{
    weight=3-Math.min(ws.streak,2);
    weight+=wrongRatio*2;
    weight+=Math.min(daysSince*0.3,2);
  }
  return Math.max(weight,0.1);
}

function getMasteryState(hanzi){
  const ws=getWordState(hanzi);
  if(ws.seen===0) return 'unseen';
  if(!ws.mastered) return 'learning';
  const daysSince=ws.lastCorrect?Math.floor((Date.now()-ws.lastCorrect)/(1000*60*60*24)):30;
  if(daysSince>=14) return 'needs-review';
  if(daysSince>=7) return 'fading';
  return 'mastered';
}

function getMasteryCounts(){
  const counts={mastered:0,fading:0,learning:0,unseen:0,'needs-review':0};
  for(const w of WORDS) counts[getMasteryState(w.hanzi)]++;
  return counts;
}

function weightedRandomWord(pool){
  if(pool.length===0) return null;
  const weights=pool.map(w=>getWordWeight(w.hanzi));
  const total=weights.reduce((a,b)=>a+b,0);
  let r=Math.random()*total;
  for(let i=0;i<pool.length;i++){
    r-=weights[i];
    if(r<=0) return pool[i];
  }
  return pool[pool.length-1];
}

const hasTTS = 'speechSynthesis' in window;
let zhVoice = null;

function initTTS(){
  if(!hasTTS) return;
  const pickVoice = () => {
    const voices = speechSynthesis.getVoices();
    zhVoice = voices.find(v => v.lang === 'zh-CN')
      || voices.find(v => v.lang.startsWith('zh'))
      || null;
  };
  pickVoice();
  speechSynthesis.onvoiceschanged = pickVoice;
}

function speakChinese(text){
  if(!hasTTS) return;
  speechSynthesis.cancel();
  const clean = text.includes('/') ? text.split('/')[0].trim() : text;
  const spoken = clean.replace(/\.\.\./g, '');
  const u = new SpeechSynthesisUtterance(spoken);
  u.lang = 'zh-CN';
  u.rate = 0.85;
  if(zhVoice) u.voice = zhVoice;
  speechSynthesis.speak(u);
}

// ===== SPEECH RECOGNITION =====
const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
const hasSpeechRec = !!SpeechRec;
let recognizer = null;
let isRecording = false;
let recStarted = false;
let pendingRecCallback = null;
let pendingRecExpected = '';

function initSpeechRec(){
  if(!hasSpeechRec) return;
  recognizer = new SpeechRec();
  recognizer.lang = 'zh-CN';
  recognizer.interimResults = false;
  recognizer.maxAlternatives = 5;
  recognizer.continuous = true;

  recognizer.onresult = (e) => {
    if(!pendingRecCallback) return;
    const cb = pendingRecCallback;
    const cleanExpected = pendingRecExpected;
    pendingRecCallback = null;
    isRecording = false;
    const resultIdx = e.results.length - 1;
    const results = e.results[resultIdx];
    let matched = false;
    let heardText = '';
    for(let i = 0; i < results.length; i++){
      const t = results[i].transcript.trim();
      if(!heardText) heardText = t;
      if(t === cleanExpected || t.includes(cleanExpected) || cleanExpected.includes(t)){
        matched = true;
        heardText = t;
        break;
      }
    }
    cb({matched, heard: heardText, expected: cleanExpected});
  };

  recognizer.onerror = (e) => {
    if(pendingRecCallback){
      const cb = pendingRecCallback;
      pendingRecCallback = null;
      isRecording = false;
      cb({matched: false, heard: '', expected: pendingRecExpected, error: e.error});
    }
  };

  recognizer.onend = () => {
    isRecording = false;
    if(recStarted){
      try{ recognizer.start(); }catch(e){}
    }
  };
}

function startRecognition(expectedHanzi, callback){
  if(!hasSpeechRec || !recognizer) return;
  const expected = expectedHanzi.includes('/')
    ? expectedHanzi.split('/')[0].trim()
    : expectedHanzi;
  pendingRecExpected = expected.replace(/\.\.\./g, '');
  pendingRecCallback = callback;
  isRecording = true;
  if(!recStarted){
    recStarted = true;
    try{ recognizer.start(); }catch(e){ isRecording = false; }
  }
}

function spawnCoins(count, originX, originY){
  const cx = originX ?? window.innerWidth / 2;
  const cy = originY ?? window.innerHeight * 0.45;
  for(let i = 0; i < count; i++){
    const el = document.createElement('div');
    el.className = 'coin';
    el.textContent = '🪙';
    el.style.left = cx + 'px';
    el.style.top = cy + 'px';
    document.body.appendChild(el);
    const angle = -Math.PI/2 + (Math.random() - 0.5) * Math.PI * 0.9;
    const speed = 3 + Math.random() * 4;
    let vx = Math.cos(angle) * speed;
    let vy = Math.sin(angle) * speed;
    const gravity = 0.15;
    let x = 0, y = 0, opacity = 1;
    const delay = i * 30;
    let started = false;
    const t0 = performance.now();
    function tick(now){
      if(now - t0 < delay){requestAnimationFrame(tick);return;}
      if(!started){started = true;}
      vy += gravity;
      x += vx;
      y += vy;
      if(vy > 0) opacity -= 0.025;
      el.style.transform = `translate(${x}px,${y}px)`;
      el.style.opacity = Math.max(opacity, 0);
      if(opacity > 0){
        requestAnimationFrame(tick);
      }else{
        el.remove();
      }
    }
    requestAnimationFrame(tick);
  }
}

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

// ===== PRACTICE SESSION CONTROLLER =====
let sessionPlan = [];
let sessionIndex = 0;
let sessionResults = []; // 'correct'|'wrong'|'pending' per slot
let sessionMistakes = [];
let sessionOverlay = null;
let sessionTimers = []; // track all interval IDs for cleanup

function clearSessionTimers(){
  for(const t of sessionTimers) clearInterval(t);
  sessionTimers = [];
}

function buildSessionPlan(){
  // 10 question slots. Mode distribution: flashcard 40%, match 25%, context 20%, pairs 15%
  // Pairs takes ~4 slots when it appears
  const plan = [];
  const pool = [...WORDS];

  // Decide if pairs round is included (roughly 60% chance)
  const includePairs = Math.random() < 0.6 && pool.length >= 4;
  const pairsSlot = includePairs ? Math.floor(Math.random() * 3) + 4 : -1; // slots 4-6 area

  let slotIdx = 0;
  while(slotIdx < 10){
    if(includePairs && slotIdx === pairsSlot){
      // Pick 4 words for pairs
      const pairsWords = [];
      const tempPool = [...pool]; shuffle(tempPool);
      for(let i = 0; i < Math.min(4, tempPool.length); i++) pairsWords.push(tempPool[i]);
      plan.push({mode:'pairs', words:pairsWords, slots:4});
      slotIdx += 4;
      continue;
    }
    const word = weightedRandomWord(pool) || pool[Math.floor(Math.random()*pool.length)];
    const r = Math.random();
    let mode;
    if(r < 0.40) mode = 'flashcard';
    else if(r < 0.65) mode = 'match';
    else mode = 'context';

    // Context needs a sentence for this word
    if(mode === 'context'){
      const hasSentence = SENTENCES.some(s => s.answer === word.hanzi);
      if(!hasSentence) mode = 'match'; // fallback
    }

    plan.push({mode, word, slots:1});
    slotIdx++;
  }
  return plan;
}

function startPracticeSession(focusWords){
  // Build plan
  if(focusWords && focusWords.length > 0){
    // Focus mode: all flashcards for specific words
    sessionPlan = focusWords.map(w => ({mode:'flashcard', word:w, slots:1}));
    // Pad to at least 5
    while(sessionPlan.length < 5) sessionPlan = [...sessionPlan, ...focusWords.map(w => ({mode:'flashcard', word:w, slots:1}))];
    sessionPlan = sessionPlan.slice(0, 10);
  } else {
    sessionPlan = buildSessionPlan();
  }

  sessionIndex = 0;
  // Count total visual dots
  let totalDots = 0;
  for(const p of sessionPlan) totalDots += p.slots;
  sessionResults = new Array(totalDots).fill('pending');
  sessionMistakes = [];

  // Create overlay
  sessionOverlay = document.createElement('div');
  sessionOverlay.className = 'practice-overlay';
  sessionOverlay.innerHTML = `<div class="practice-inner">
    <div class="practice-header">
      <button class="practice-close" id="practiceClose">✕</button>
      <div class="progress-dots" id="progressDots"></div>
    </div>
    <div class="practice-body" id="practiceBody"></div>
  </div>`;
  document.body.appendChild(sessionOverlay);
  document.getElementById('practiceClose').addEventListener('click', () => endPracticeSession());
  renderProgressDots();
  showSessionQuestion();
}

function getDotIndex(){
  let idx = 0;
  for(let i = 0; i < sessionIndex; i++) idx += sessionPlan[i].slots;
  return idx;
}

function renderProgressDots(){
  const container = document.getElementById('progressDots');
  if(!container) return;
  container.innerHTML = '';
  const currentDot = getDotIndex();
  for(let i = 0; i < sessionResults.length; i++){
    const dot = document.createElement('div');
    dot.className = 'dot';
    if(i === currentDot) dot.classList.add('current');
    else if(sessionResults[i] === 'correct') dot.classList.add('correct');
    else if(sessionResults[i] === 'wrong') dot.classList.add('wrong');
    container.appendChild(dot);
  }
}

function showSessionQuestion(){
  if(sessionIndex >= sessionPlan.length){
    showSessionResults();
    return;
  }
  const item = sessionPlan[sessionIndex];
  const body = document.getElementById('practiceBody');
  body.innerHTML = '';
  renderProgressDots();

  if(item.mode === 'flashcard') renderSessionFlashcard(body, item.word);
  else if(item.mode === 'match') renderSessionMatch(body, item.word);
  else if(item.mode === 'context') renderSessionContext(body, item.word);
  else if(item.mode === 'pairs') renderSessionPairs(body, item.words);
}

function sessionAnswer(correct, word){
  const dotIdx = getDotIndex();
  const item = sessionPlan[sessionIndex];

  if(item.mode === 'pairs'){
    // Pairs handles its own dot advancement
    return;
  }

  sessionResults[dotIdx] = correct ? 'correct' : 'wrong';

  // Update word state
  const ws = getWordState(word.hanzi);
  ws.seen++;
  state.totalAnswered++;

  if(correct){
    ws.streak = Math.min(ws.streak + 1, 3);
    ws.correct++;
    ws.lastCorrect = Date.now();
    state.totalCorrect++;
    state.streak++;
    if(state.streak > state.bestStreak) state.bestStreak = state.streak;
    addXP(maybeDoubleXP(10 + (state.streak >= 5 ? 5 : 0)));
    spawnCoins(state.streak >= 5 ? 8 : 4);
    if(ws.streak >= 3 && !ws.mastered){
      ws.mastered = true;
      showXPPopup('Mastered: ' + word.hanzi);
      addXP(20);
      spawnConfetti(15);
      spawnCoins(12);
    }
    if(state.streak >= 3) showStreak(state.streak);
    if(state.streak === 10) spawnConfetti(20);
    speakChinese(word.hanzi);
  } else {
    ws.streak = 0;
    ws.wrong++;
    state.streak = 0;
    sessionMistakes.push(word);
  }
  saveState();
  renderProgressDots();

  // Advance after delay
  setTimeout(() => {
    sessionIndex++;
    showSessionQuestion();
  }, correct ? 800 : 1200);
}

// ===== SESSION: MATCH =====
function renderSessionMatch(body, word){
  const pool = [...WORDS];
  const correct = word;

  const directions = ['hanzi2eng','eng2hanzi','pinyin2eng'];
  const dir = directions[Math.floor(Math.random() * directions.length)];

  let audioOnly = false;
  if(dir === 'hanzi2eng' && Math.random() < 0.5) audioOnly = true;

  let promptHTML = '';
  let audioHidden = '';

  if(audioOnly){
    promptHTML = `<div class="direction">Listen — what does it mean?</div><div class="question" style="font-size:3rem">🔊</div>`;
  } else if(dir === 'hanzi2eng'){
    promptHTML = `<div class="direction">What does this mean?</div><div class="question">${correct.hanzi}</div>`;
  } else if(dir === 'eng2hanzi'){
    promptHTML = `<div class="direction">Choose the correct characters</div><div class="question english-q">${correct.english}</div>`;
    audioHidden = ' hidden';
  } else {
    promptHTML = `<div class="direction">What does this mean?</div><div class="question pinyin-q">${correct.pinyin}</div>`;
  }

  const options = [correct];
  const others = pool.filter(w => w.hanzi !== correct.hanzi); shuffle(others);
  while(options.length < 4 && others.length > 0) options.push(others.pop());
  shuffle(options);

  body.innerHTML = `
    <div class="quiz-prompt">
      ${promptHTML}
      <button class="audio-btn${audioHidden}" id="sessionMatchAudio">&#x1f50a;</button>
    </div>
    <div class="quiz-timer"><div class="bar"><div class="fill" id="sessionMatchTimerFill"></div></div></div>
    <div class="quiz-options" id="sessionMatchOptions"></div>`;

  const container = body.querySelector('#sessionMatchOptions');
  let answered = false;

  for(const opt of options){
    const btn = document.createElement('button');
    btn.textContent = dir === 'eng2hanzi' ? opt.hanzi : opt.english;
    btn.addEventListener('click', () => {
      if(answered) return;
      answered = true;
      clearSessionTimers();
      container.querySelectorAll('button').forEach(b => b.disabled = true);

      if(opt.hanzi === correct.hanzi){
        btn.classList.add('correct','correct-pulse');
        sessionAnswer(true, correct);
      } else {
        btn.classList.add('wrong','shake');
        container.querySelectorAll('button').forEach(b => {
          const correctText = dir === 'eng2hanzi' ? correct.hanzi : correct.english;
          if(b.textContent === correctText) b.classList.add('correct');
        });
        sessionAnswer(false, correct);
      }
    });
    container.appendChild(btn);
  }

  speakChinese(correct.hanzi);
  body.querySelector('#sessionMatchAudio').addEventListener('click', () => speakChinese(correct.hanzi));

  // Timer: 10s
  let timeLeft = 10;
  const fill = body.querySelector('#sessionMatchTimerFill');
  fill.style.width = '100%';
  const timer = setInterval(() => {
    timeLeft -= 0.1;
    fill.style.width = Math.max((timeLeft/10)*100, 0) + '%';
    if(timeLeft <= 3) fill.classList.add('urgent');
    if(timeLeft <= 0){
      clearInterval(timer);
      if(!answered){
        answered = true;
        container.querySelectorAll('button').forEach(b => {
          b.disabled = true;
          const correctText = dir === 'eng2hanzi' ? correct.hanzi : correct.english;
          if(b.textContent === correctText) b.classList.add('correct');
        });
        sessionAnswer(false, correct);
      }
    }
  }, 100);
  sessionTimers.push(timer);
}

// ===== SESSION: CONTEXT =====
function renderSessionContext(body, word){
  const sentences = SENTENCES.filter(s => s.answer === word.hanzi);
  if(sentences.length === 0){
    // Fallback to match if no sentence
    renderSessionMatch(body, word);
    return;
  }
  const s = sentences[Math.floor(Math.random() * sentences.length)];
  const parts = s.sentence.split('_____');

  const correctWord = word;
  const pool = WORDS.filter(w => w.hanzi !== s.answer); shuffle(pool);
  const options = [correctWord];
  while(options.length < 4 && pool.length > 0) options.push(pool.pop());
  shuffle(options);

  body.innerHTML = `
    <div class="quiz-prompt"><div class="direction">Fill in the blank</div></div>
    <div class="context-sentence">${parts[0]}<span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>${parts[1]||''}</div>
    <div class="context-english">${s.english}</div>
    <div class="quiz-timer"><div class="bar"><div class="fill" id="sessionCtxTimerFill"></div></div></div>
    <div class="quiz-options" id="sessionCtxOptions"></div>`;

  const container = body.querySelector('#sessionCtxOptions');
  let answered = false;

  for(const opt of options){
    const btn = document.createElement('button');
    btn.textContent = opt.hanzi;
    btn.addEventListener('click', () => {
      if(answered) return;
      answered = true;
      clearSessionTimers();
      container.querySelectorAll('button').forEach(b => b.disabled = true);
      const blankEl = body.querySelector('.context-sentence .blank');

      if(opt.hanzi === correctWord.hanzi){
        btn.classList.add('correct','correct-pulse');
        if(blankEl) blankEl.textContent = correctWord.hanzi;
        sessionAnswer(true, correctWord);
      } else {
        btn.classList.add('wrong','shake');
        container.querySelectorAll('button').forEach(b => {
          if(b.textContent === correctWord.hanzi) b.classList.add('correct');
        });
        if(blankEl) blankEl.textContent = correctWord.hanzi;
        sessionAnswer(false, correctWord);
      }
    });
    container.appendChild(btn);
  }

  speakChinese(s.answer);

  // Timer: 15s
  let timeLeft = 15;
  const fill = body.querySelector('#sessionCtxTimerFill');
  fill.style.width = '100%';
  const timer = setInterval(() => {
    timeLeft -= 0.1;
    fill.style.width = Math.max((timeLeft/15)*100, 0) + '%';
    if(timeLeft <= 4) fill.classList.add('urgent');
    if(timeLeft <= 0){
      clearInterval(timer);
      if(!answered){
        answered = true;
        container.querySelectorAll('button').forEach(b => {
          b.disabled = true;
          if(b.textContent === correctWord.hanzi) b.classList.add('correct');
        });
        const blankEl = body.querySelector('.context-sentence .blank');
        if(blankEl) blankEl.textContent = correctWord.hanzi;
        sessionAnswer(false, correctWord);
      }
    }
  }, 100);
  sessionTimers.push(timer);
}

// ===== SESSION: PAIRS =====
function renderSessionPairs(body, words){
  if(!words || words.length < 2){
    // Edge case: not enough words, skip
    sessionIndex++;
    showSessionQuestion();
    return;
  }
  const pairsWords = words.slice(0, 4);
  let pairsMatched = 0;
  let pairsSelected = null;

  const tiles = [];
  for(const w of pairsWords){
    tiles.push({type:'chinese',text:w.hanzi,hanzi:w.hanzi});
    tiles.push({type:'english',text:w.english,hanzi:w.hanzi});
  }
  const chinese = tiles.filter(t => t.type === 'chinese');
  const english = tiles.filter(t => t.type === 'english');
  shuffle(chinese); shuffle(english);

  body.innerHTML = `<div style="text-align:center;padding:8px;font-size:.85rem;color:var(--text2)">Match the pairs!</div>
    <div class="pairs-grid" id="sessionPairsGrid"></div>`;

  const grid = body.querySelector('#sessionPairsGrid');

  function createTile(tileData){
    const el = document.createElement('div');
    el.className = 'pair-tile' + (tileData.type === 'chinese' ? ' chinese' : '');
    el.textContent = tileData.text;
    el.dataset.hanzi = tileData.hanzi;
    el.dataset.type = tileData.type;
    el.addEventListener('click', () => handleTap(el));
    return el;
  }

  function handleTap(el){
    if(el.classList.contains('matched')) return;
    if(pairsSelected === el){
      el.classList.remove('selected');
      pairsSelected = null;
      return;
    }
    if(!pairsSelected){
      el.classList.add('selected');
      pairsSelected = el;
      return;
    }
    const first = pairsSelected;
    const second = el;
    if(first.dataset.type === second.dataset.type){
      first.classList.remove('selected');
      el.classList.add('selected');
      pairsSelected = el;
      return;
    }
    if(first.dataset.hanzi === second.dataset.hanzi){
      first.classList.remove('selected');
      first.classList.add('matched');
      second.classList.add('matched');
      pairsSelected = null;
      pairsMatched++;

      const ws = getWordState(first.dataset.hanzi);
      ws.seen++; ws.correct++; ws.lastCorrect = Date.now(); ws.streak = Math.min(ws.streak+1, 3);
      state.totalCorrect++; state.totalAnswered++;
      addXP(maybeDoubleXP(8, second));
      spawnCoins(3);
      speakChinese(first.dataset.hanzi);
      if(ws.streak >= 3 && !ws.mastered){ ws.mastered = true; showXPPopup('Mastered: '+first.dataset.hanzi); addXP(20); }

      // Mark dot
      const baseDot = getDotIndex();
      sessionResults[baseDot + pairsMatched - 1] = 'correct';
      renderProgressDots();
      saveState();

      if(pairsMatched >= pairsWords.length){
        addXP(15);
        spawnConfetti(15);
        // Fill remaining dots as correct
        for(let d = pairsMatched; d < sessionPlan[sessionIndex].slots; d++){
          sessionResults[baseDot + d] = 'correct';
        }
        renderProgressDots();
        setTimeout(() => {
          sessionIndex++;
          showSessionQuestion();
        }, 800);
      }
    } else {
      first.classList.remove('selected');
      first.classList.add('wrong');
      second.classList.add('wrong');
      state.totalAnswered++;
      pairsSelected = null;
      saveState();
      setTimeout(() => { first.classList.remove('wrong'); second.classList.remove('wrong'); }, 400);
    }
  }

  for(let i = 0; i < pairsWords.length; i++){
    grid.appendChild(createTile(chinese[i]));
    grid.appendChild(createTile(english[i]));
  }
}

function showSessionResults(){
  clearSessionTimers();
  const body = document.getElementById('practiceBody');
  const correct = sessionResults.filter(r => r === 'correct').length;
  const total = sessionResults.length;

  // Dedupe mistakes
  const uniqueMistakes = []; const seen = new Set();
  for(const w of sessionMistakes){ if(!seen.has(w.hanzi)){ seen.add(w.hanzi); uniqueMistakes.push(w); } }

  let mistakeHTML = '';
  if(uniqueMistakes.length > 0){
    mistakeHTML = '<div class="review-mistakes-list">';
    for(const w of uniqueMistakes){
      mistakeHTML += `<div class="mistake-item">
        <div class="mi-hanzi">${w.hanzi}</div>
        <div class="mi-detail"><span class="mi-pinyin">${w.pinyin}</span><br>${w.english}</div>
        <button class="audio-btn" data-hanzi="${w.hanzi}">&#x1f50a;</button>
      </div>`;
    }
    mistakeHTML += '</div>';
  }

  const msg = correct >= total ? 'Perfect!' : correct >= total*0.8 ? 'Great work!' : correct >= total*0.5 ? 'Good effort!' : 'Keep practising!';

  body.innerHTML = `<div class="practice-results">
    <h2>Session Complete!</h2>
    <div class="big-num">${correct} / ${total}</div>
    <div class="detail">${msg}</div>
    ${uniqueMistakes.length > 0 ? '<div class="detail" style="color:var(--accent2);font-weight:600">Words to review:</div>' + mistakeHTML : ''}
    <div class="result-actions">
      <button class="btn-done" id="sessionDone">Done</button>
      <button class="btn-again" id="sessionAgain">Again</button>
    </div>
  </div>`;

  if(correct >= total) spawnConfetti(30);
  renderProgressDots();

  body.querySelectorAll('.audio-btn[data-hanzi]').forEach(btn => {
    btn.addEventListener('click', () => speakChinese(btn.dataset.hanzi));
  });

  body.querySelector('#sessionDone').addEventListener('click', () => endPracticeSession());
  body.querySelector('#sessionAgain').addEventListener('click', () => {
    endPracticeSession();
    startPracticeSession();
  });
}

function endPracticeSession(){
  clearSessionTimers();
  if(sessionOverlay){
    sessionOverlay.remove();
    sessionOverlay = null;
  }
  updateUI();
}

// Wire practice button
document.getElementById('practiceBtn').addEventListener('click', () => startPracticeSession());

// ===== UPDATE UI (recursion-guarded) =====
let _updatingUI = false;
function updateUI(){
  if(_updatingUI) return;
  _updatingUI = true;

  renderHomeGrid();
  renderSummaryLine();
  renderTopBar();

  // Mastery milestones
  const counts = getMasteryCounts();
  const mastered = counts.mastered;
  const total = WORDS.length;
  const pct = Math.round(mastered/total*100);
  if(pct >= 100 && !state._m100){ state._m100 = true; spawnConfetti(60); showXPPopup('All words mastered!'); }
  else if(pct >= 50 && !state._m50){ state._m50 = true; spawnConfetti(40); showXPPopup('50% Mastery!'); }

  checkBadges();
  _updatingUI = false;
}

// ===== KEYBOARD SHORTCUTS =====
document.addEventListener('keydown', e => {
  // Only in practice session flashcard mode
  const fc = document.getElementById('sessionFlashcard');
  if(fc){
    if(e.key === ' ' || e.key === 'Enter'){
      e.preventDefault();
      if(!fc.classList.contains('flipped')) fc.classList.add('flipped');
    }
    if(e.key === 'ArrowRight' || e.key === 'l'){
      const btn = document.getElementById('sessionBtnGotIt');
      if(btn) btn.click();
    }
    if(e.key === 'ArrowLeft' || e.key === 'h'){
      const btn = document.getElementById('sessionBtnHard');
      if(btn) btn.click();
    }
  }
});

// ===== INIT =====
loadState();
applyTheme(state.activeTheme || 'default');
initTTS();
initSpeechRec();
updateUI();

// Welcome banner — show once per session
if(!sessionStorage.getItem('lucyWelcomeSeen')){
  const emojiSets=['💅✨💖','💕🌸✨','💖🦋💅','✨💜🌟','💅💕🎀','🌸💖✨','💜💅🌟','✨🎀💖'];
  const emojis=emojiSets[Math.floor(Math.random()*emojiSets.length)];
  document.getElementById('welcomeTitle').textContent='Hey Lucy! '+emojis;
  const wo=document.getElementById('welcomeOverlay');
  wo.classList.add('show');
  document.getElementById('welcomeStart').addEventListener('click',()=>{
    wo.classList.remove('show');
    sessionStorage.setItem('lucyWelcomeSeen','1');
  });
}

// ===== SERVICE WORKER =====
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').then(reg=>{
    setInterval(()=>reg.update(),30*60*1000);
  });
  navigator.serviceWorker.addEventListener('message',e=>{
    if(e.data?.type==='UPDATE_AVAILABLE') location.reload();
  });
}
</script>
